<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbejdsplatform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f1ea; --bg-deep: #ebe5db; --surface: #fdfbf7; --surface-2: #f9f5ee;
      --ink: #1a1814; --ink-soft: #6b6358; --ink-faint: #a39a8a;
      --line: #e3dccf; --line-soft: #ede7da;
      --warm: #c4622a; --warm-soft: #f4e6d6;
      --green: #3d6e4a; --green-soft: #dfe9d9;
      --red: #a8362c;
      --display: 'Fraunces', Georgia, serif;
      --body: 'Inter', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--body); -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; font-size: 16px; }
    @media (min-width: 768px) {
      input, textarea, select { font-size: 14px; }
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Firebase v10 modular SDK via CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc,
      updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRJK6_EB8VHVbY8kYFvS0AhwywNtURug8",
      authDomain: "hr-tidsregistrering.firebaseapp.com",
      projectId: "hr-tidsregistrering",
      storageBucket: "hr-tidsregistrering.firebasestorage.app",
      messagingSenderId: "97158315115",
      appId: "1:97158315115:web:8a9ec5e16ae821e7d9852e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Expose to global so the React code can use them
    window.firebaseApp = app;
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.firebaseFns = {
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential,
      collection, doc, setDoc, getDoc, getDocs, addDoc,
      updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp, arrayUnion
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script type="text/babel" data-presets="react" data-type="module">
    const { useState, useEffect, useMemo, useCallback, useRef, Fragment } = React;

    // Wait for Firebase to be ready before rendering
    function App() {
      const [fbReady, setFbReady] = useState(!!window.firebaseAuth);
      useEffect(() => {
        if (window.firebaseAuth) return;
        const onReady = () => setFbReady(true);
        window.addEventListener('firebase-ready', onReady);
        return () => window.removeEventListener('firebase-ready', onReady);
      }, []);
      if (!fbReady) return <LoadingScreen text="Forbinder til Firebase…" />;
      return <PlatformApp />;
    }

    function PlatformApp() {
      const auth = window.firebaseAuth;
      const db = window.firebaseDb;
      const fns = window.firebaseFns;

      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const [authUser, setAuthUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authError, setAuthError] = useState('');

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [comments, setComments] = useState({});
      // Department data — keyed by department id ('reception', 'kontor', 'steril')
      const [deptTasks, setDeptTasks] = useState({ reception: [], kontor: [], steril: [] });
      const [deptNotes, setDeptNotes] = useState({ reception: [], kontor: [], steril: [] });

      const [view, setView] = useState('tasks');
      const [showNewTask, setShowNewTask] = useState(false);
      const [showNewDoc, setShowNewDoc] = useState(false);
      const [editDoc, setEditDoc] = useState(null);
      const [showNewDeptTask, setShowNewDeptTask] = useState(null); // dept id when open
      const [showNewUser, setShowNewUser] = useState(false);
      const [showChangePassword, setShowChangePassword] = useState(false);
      const [showNewYearwheelTask, setShowNewYearwheelTask] = useState(null);
      const [editYearwheelTask, setEditYearwheelTask] = useState(null);
      const [showYearwheelAccess, setShowYearwheelAccess] = useState(false);
      const [showExportYearwheel, setShowExportYearwheel] = useState(false);
      const [showYearwheelExport, setShowYearwheelExport] = useState(false);
      const [selectedTask, setSelectedTask] = useState(null);
      const [yearwheelTasks, setYearwheelTasks] = useState([]);
      const [yearwheelChecks, setYearwheelChecks] = useState({});
      const [yearwheelDocs, setYearwheelDocs] = useState([]);
      const [yearwheelAccess, setYearwheelAccess] = useState({ userIds: [] });
      const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1);
      const [showNewYearwheelDoc, setShowNewYearwheelDoc] = useState(false);
      const [editYearwheelDoc, setEditYearwheelDoc] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterStatus, setFilterStatus] = useState('all');

      // Department definitions
      const DEPARTMENTS = [
        { id: 'reception', label: 'Reception', tasksCollection: 'platform_reception_tasks', notesCollection: 'platform_handover_notes' },
        { id: 'kontor', label: 'Kontor', tasksCollection: 'platform_kontor_tasks', notesCollection: 'platform_kontor_notes' },
        { id: 'steril', label: 'Steril', tasksCollection: 'platform_steril_tasks', notesCollection: 'platform_steril_notes' },
      ];

      // Listen to auth state
      useEffect(() => {
        const unsub = fns.onAuthStateChanged(auth, async (user) => {
          if (user) {
            setAuthUser(user);
            // Load or create user profile in Firestore
            try {
              const profileRef = fns.doc(db, 'platform_users', user.uid);
              const snap = await fns.getDoc(profileRef);
              if (snap.exists()) {
                setUserProfile({ id: user.uid, ...snap.data() });
              } else {
                // First time login - create profile (default role = medarbejder)
                const profile = {
                  email: user.email,
                  name: user.displayName || user.email.split('@')[0],
                  role: 'medarbejder',
                  createdAt: new Date().toISOString(),
                };
                await fns.setDoc(profileRef, profile);
                setUserProfile({ id: user.uid, ...profile });
              }
            } catch (e) {
              console.error('Profile load error:', e);
              setAuthError('Kunne ikke indlæse din profil: ' + e.message);
            }
          } else {
            setAuthUser(null);
            setUserProfile(null);
          }
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      // Subscribe to all collections once logged in
      useEffect(() => {
        if (!userProfile) return;
        const unsubs = [];

        // Users
        unsubs.push(fns.onSnapshot(fns.collection(db, 'platform_users'), (snap) => {
          setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }));

        // Tasks
        unsubs.push(fns.onSnapshot(
          fns.query(fns.collection(db, 'platform_tasks'), fns.orderBy('createdAt', 'desc')),
          (snap) => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        // Documents
        unsubs.push(fns.onSnapshot(
          fns.query(fns.collection(db, 'platform_documents'), fns.orderBy('createdAt', 'desc')),
          (snap) => setDocuments(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        // Comments (one document per task, holding an array)
        unsubs.push(fns.onSnapshot(fns.collection(db, 'platform_comments'), (snap) => {
          const map = {};
          snap.docs.forEach(d => { map[d.id] = d.data().items || []; });
          setComments(map);
        }));

        // Department tasks + notes — subscribe per department
        DEPARTMENTS.forEach(dept => {
          unsubs.push(fns.onSnapshot(
            fns.query(fns.collection(db, dept.tasksCollection), fns.orderBy('createdAt', 'desc')),
            (snap) => setDeptTasks(prev => ({ ...prev, [dept.id]: snap.docs.map(d => ({ id: d.id, ...d.data() })) }))
          ));
          unsubs.push(fns.onSnapshot(
            fns.query(fns.collection(db, dept.notesCollection), fns.orderBy('createdAt', 'desc')),
            (snap) => setDeptNotes(prev => ({ ...prev, [dept.id]: snap.docs.map(d => ({ id: d.id, ...d.data() })) }))
          ));
        });

        // Yearwheel tasks
        unsubs.push(fns.onSnapshot(
          fns.collection(db, 'platform_yearwheel_tasks'),
          (snap) => setYearwheelTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        // Yearwheel checks (one doc per year)
        unsubs.push(fns.onSnapshot(
          fns.collection(db, 'platform_yearwheel_checks'),
          (snap) => {
            const map = {};
            snap.docs.forEach(d => { map[d.id] = d.data().completed || {}; });
            setYearwheelChecks(map);
          }
        ));

        // Yearwheel access settings
        unsubs.push(fns.onSnapshot(
          fns.doc(db, 'platform_settings', 'yearwheel_access'),
          (snap) => setYearwheelAccess(snap.exists() ? snap.data() : { userIds: [] })
        ));

        // Yearwheel documents
        unsubs.push(fns.onSnapshot(
          fns.query(fns.collection(db, 'platform_yearwheel_docs'), fns.orderBy('createdAt', 'desc')),
          (snap) => setYearwheelDocs(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        return () => unsubs.forEach(u => u());
      }, [userProfile?.id]);

      // ---- Auth handlers ----
      const handleLogin = async (email, password) => {
        setAuthError('');
        try {
          await fns.signInWithEmailAndPassword(auth, email, password);
        } catch (e) {
          setAuthError(translateAuthError(e.code));
        }
      };

      const handleLogout = async () => {
        try { await fns.signOut(auth); } catch (e) { console.error(e); }
      };

      // ---- User management (admin only) ----
      const createNewUser = async (email, password, name, role) => {
        try {
          // Note: this signs the new user in, then we sign back in as admin
          // Better solution: use Firebase Admin SDK (server-side). For prototype this works.
          const cred = await fns.createUserWithEmailAndPassword(auth, email, password);
          await fns.updateProfile(cred.user, { displayName: name });
          await fns.setDoc(fns.doc(db, 'platform_users', cred.user.uid), {
            email, name, role,
            createdAt: new Date().toISOString(),
          });
          // Re-login as admin happens automatically because onAuthStateChanged
          // fires for the new user. Admin must log in again. Show message.
          alert(`Bruger "${name}" oprettet! Da Firebase nu har logget den nye bruger ind, skal du logge ind igen som admin.`);
          return true;
        } catch (e) {
          alert('Fejl ved oprettelse: ' + translateAuthError(e.code) + ' (' + e.message + ')');
          return false;
        }
      };

      const updateUserRole = async (uid, newRole) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_users', uid), { role: newRole });
        } catch (e) {
          alert('Fejl: ' + e.message);
        }
      };

      // ---- Task handlers ----
      const createTask = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_tasks'), {
            ...data, status: 'todo',
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewTask(false);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateTaskStatus = async (id, status) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_tasks', id), {
            status, updatedAt: new Date().toISOString(),
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateTask = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_tasks', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteTask = async (id) => {
        if (!confirm('Slet denne opgave?')) return;
        try {
          await fns.deleteDoc(fns.doc(db, 'platform_tasks', id));
          await fns.deleteDoc(fns.doc(db, 'platform_comments', id)).catch(() => {});
          setSelectedTask(null);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const addComment = async (taskId, text, mentions) => {
        const trimmed = text.trim();
        if (!trimmed) return;
        try {
          const ref = fns.doc(db, 'platform_comments', taskId);
          const snap = await fns.getDoc(ref);
          const newItem = {
            id: Date.now().toString(),
            author: userProfile.name, authorId: userProfile.id,
            text: trimmed, createdAt: new Date().toISOString(),
            mentions: mentions || [],
          };
          if (snap.exists()) {
            await fns.updateDoc(ref, { items: fns.arrayUnion(newItem) });
          } else {
            await fns.setDoc(ref, { items: [newItem] });
          }
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Document handlers ----
      const createDocument = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_documents'), {
            ...data,
            uploadedBy: userProfile.name, uploadedById: userProfile.id,
            createdAt: new Date().toISOString(),
          });
          setShowNewDoc(false);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteDocument = async (id) => {
        if (!confirm('Slet dette dokument?')) return;
        try { await fns.deleteDoc(fns.doc(db, 'platform_documents', id)); }
        catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDocument = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_documents', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Department handlers (generic for reception, kontor, steril) ----
      const getDept = (deptId) => DEPARTMENTS.find(d => d.id === deptId);

      const createDeptTask = async (deptId, data) => {
        try {
          const dept = getDept(deptId);
          await fns.addDoc(fns.collection(db, dept.tasksCollection), {
            ...data, status: 'todo',
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewDeptTask(null);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptTaskStatus = async (deptId, id, status) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.tasksCollection, id), {
            status, updatedAt: new Date().toISOString(),
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptTask = async (deptId, id, data) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.tasksCollection, id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptNote = async (deptId, id, text, urgent) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.notesCollection, id), {
            text: text.trim(), urgent: !!urgent,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Yearwheel handlers ----
      const createYearwheelTask = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_yearwheel_tasks'), {
            ...data,
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewYearwheelTask(null);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateYearwheelTask = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_yearwheel_tasks', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteYearwheelTask = async (id) => {
        if (!confirm('Slet denne opgave fra årshjulet?')) return;
        try { await fns.deleteDoc(fns.doc(db, 'platform_yearwheel_tasks', id)); }
        catch (e) { alert('Fejl: ' + e.message); }
      };

      const toggleYearwheelCheck = async (taskId, year) => {
        try {
          const ref = fns.doc(db, 'platform_yearwheel_checks', String(year));
          const snap = await fns.getDoc(ref);
          const completed = snap.exists() ? (snap.data().completed || {}) : {};
          if (completed[taskId]) {
            delete completed[taskId];
          } else {
            completed[taskId] = {
              by: userProfile.name,
              byId: userProfile.id,
              at: new Date().toISOString(),
            };
          }
          if (snap.exists()) {
            await fns.updateDoc(ref, { completed });
          } else {
            await fns.setDoc(ref, { completed, year });
          }
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateYearwheelAccess = async (userIds) => {
        try {
          await fns.setDoc(fns.doc(db, 'platform_settings', 'yearwheel_access'), { userIds });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const saveYearwheelTaskNote = async (taskId, note) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_yearwheel_tasks', taskId), {
            note: note,
            noteUpdatedAt: new Date().toISOString(),
            noteUpdatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const createYearwheelDoc = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_yearwheel_docs'), {
            ...data,
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewYearwheelDoc(false);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateYearwheelDoc = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_yearwheel_docs', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteYearwheelDoc = async (id) => {
        if (!confirm('Slet dette dokument?')) return;
        try { await fns.deleteDoc(fns.doc(db, 'platform_yearwheel_docs', id)); }
        catch (e) { alert('Fejl: ' + e.message); }
      };

      const exportYearwheelPDF = (includeStatus) => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: 'mm', format: 'a4' });
          const year = new Date().getFullYear();
          const monthNames = ['Januar', 'Februar', 'Marts', 'April', 'Maj', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'December'];
          const currentChecks = yearwheelChecks[String(year)] || {};

          const pageWidth = 210;
          const pageHeight = 297;
          const marginX = 15;
          const marginY = 15;
          let y = marginY;

          // Header
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);
          doc.setTextColor(150);
          doc.text('ARSHJUL', marginX, y);
          y += 8;
          doc.setFontSize(22);
          doc.setTextColor(30);
          doc.setFont('helvetica', 'bold');
          doc.text(`Klinikkens arshjul ${year}`, marginX, y);
          y += 7;
          doc.setFontSize(10);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(110);
          const totalTasks = yearwheelTasks.length;
          const completedTasks = yearwheelTasks.filter(t => currentChecks[t.id]).length;
          const headerSub = includeStatus
            ? `Status: ${completedTasks} af ${totalTasks} opgaver klaret (${totalTasks ? Math.round(completedTasks/totalTasks*100) : 0}%)  ·  Genereret ${new Date().toLocaleDateString('da-DK')}`
            : `${totalTasks} opgaver fordelt over aret  ·  Genereret ${new Date().toLocaleDateString('da-DK')}`;
          doc.text(headerSub, marginX, y);
          y += 8;

          // Divider line
          doc.setDrawColor(220);
          doc.setLineWidth(0.3);
          doc.line(marginX, y, pageWidth - marginX, y);
          y += 6;

          // Two columns
          const colWidth = (pageWidth - marginX * 2 - 8) / 2;
          const colX = [marginX, marginX + colWidth + 8];
          let col = 0;
          let colY = [y, y];

          for (let m = 1; m <= 12; m++) {
            const monthTasks = yearwheelTasks
              .filter(t => t.month === m)
              .sort((a, b) => (a.title || '').localeCompare(b.title || ''));

            // Estimate height needed
            const estimatedHeight = 8 + Math.max(1, monthTasks.length) * 5 + 4;

            if (colY[col] + estimatedHeight > pageHeight - marginY) {
              // Switch column or new page
              if (col === 0) {
                col = 1;
              } else {
                doc.addPage();
                colY = [marginY, marginY];
                col = 0;
              }
            }

            let curY = colY[col];
            const curX = colX[col];

            // Month header
            doc.setFontSize(13);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(40);

              doc.text(`${monthDone}/${monthTasks.length}`, curX + colWidth - 12, curY);
            }

            doc.setFontSize(10);

            if (monthTasks.length === 0) {

              monthTasks.forEach(t => {

                doc.setLineWidth(0.2);
                doc.rect(curX, curY - 3, 3, 3);
                if (includeStatus && isDone) {
                  doc.setLineWidth(0.4);

                  doc.line(curX + 1.3, curY - 0.4, curX + 2.7, curY - 2.6);

                if (includeStatus && isDone) {
                  doc.setTextColor(140);

                  doc.setTextColor(40);
                }

                const lines = doc.splitTextToSize(fullText, colWidth - 6);
                doc.text(lines, curX + 5, curY);
                curY += lines.length * 4.5;

                  doc.setFontSize(8);

                  curY += 3.5;
                  doc.setFontSize(10);
                }
              });

    // Helper: extract mentioned user IDs from text + users list
    function extractMentions(text, users) {
      const mentions = [];
      (users || []).forEach(u => {
        // Check both full name and first name
        const firstName = u.name.split(' ')[0];
        const patterns = [u.name, firstName];
        for (const p of patterns) {
          const regex = new RegExp(`@${p.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')}\\b`, 'i');
          if (regex.test(text) && !mentions.includes(u.id)) {
            mentions.push(u.id);
            break;
          }
        }
      });
      return mentions;
    }

    // Helper: render text with @mentions highlighted
    function renderTextWithMentions(text, users) {
      if (!text) return null;
      // Split text by @mentions
      const parts = [];
      const allNames = (users || []).flatMap(u => [u.name, u.name.split(' ')[0]]).filter(Boolean);
      // Sort longer names first so we match "Anna Berg" before "Anna"
      allNames.sort((a, b) => b.length - a.length);

      let remaining = text;
      let key = 0;
      while (remaining.length > 0) {
        let matched = false;
        for (const name of allNames) {
          const idx = remaining.toLowerCase().indexOf('@' + name.toLowerCase());
          if (idx === 0) {
            parts.push(<span key={key++} style={styles.mentionTag}>@{name}</span>);
            remaining = remaining.slice(name.length + 1);
            matched = true;
            break;
          }
        }
        if (!matched) {
          // Find next @ or take rest
          const nextAt = remaining.indexOf('@', 1);
          if (nextAt === -1) {
            parts.push(<span key={key++}>{remaining}</span>);
            remaining = '';
          } else {
            parts.push(<span key={key++}>{remaining.slice(0, nextAt)}</span>);
            remaining = remaining.slice(nextAt);
          }
        }
      }
      return parts;
    }

    function MentionInput({ value, onChange, users, currentUserId, placeholder, rows, autoFocus, onEnter, multiline, inputStyle }) {
      const [showPicker, setShowPicker] = useState(false);
      const [filter, setFilter] = useState('');
      const [cursorPos, setCursorPos] = useState(0);
      const [highlightIdx, setHighlightIdx] = useState(0);
      const inputRef = useRef(null);

      const selectableUsers = (users || []).filter(u => u.id !== currentUserId);
      const filtered = selectableUsers.filter(u =>
        u.name.toLowerCase().includes(filter.toLowerCase())
      );

      const handleChange = (e) => {
        const newValue = e.target.value;
        const pos = e.target.selectionStart;
        onChange(newValue);
        setCursorPos(pos);
        // Check if we should show picker
        const textBeforeCursor = newValue.slice(0, pos);
        const match = textBeforeCursor.match(/@([\w\sæøåÆØÅ]*)$/);
        if (match) {
          setShowPicker(true);
          setFilter(match[1]);
          setHighlightIdx(0);
        } else {
          setShowPicker(false);
        }
      };

      const insertMention = (user) => {
        const textBeforeCursor = value.slice(0, cursorPos);
        const textAfterCursor = value.slice(cursorPos);
        const newBefore = textBeforeCursor.replace(/@[\w\sæøåÆØÅ]*$/, `@${user.name.split(' ')[0]} `);
        const newValue = newBefore + textAfterCursor;
        onChange(newValue);
        setShowPicker(false);
        // Restore focus
        setTimeout(() => {
          if (inputRef.current) {
            inputRef.current.focus();
            const newPos = newBefore.length;
            inputRef.current.setSelectionRange(newPos, newPos);
          }
        }, 0);
      };

      const openPickerExplicitly = () => {
        const newValue = value + (value.endsWith(' ') || value === '' ? '@' : ' @');
        onChange(newValue);
        setShowPicker(true);
        setFilter('');
        setHighlightIdx(0);
        setTimeout(() => {
          if (inputRef.current) {
            inputRef.current.focus();
            inputRef.current.setSelectionRange(newValue.length, newValue.length);
            setCursorPos(newValue.length);
          }
        }, 0);
      };

      const handleKeyDown = (e) => {
        if (showPicker && filtered.length > 0) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            setHighlightIdx((i) => Math.min(i + 1, filtered.length - 1));
            return;
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            setHighlightIdx((i) => Math.max(i - 1, 0));
            return;
          }
          if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            insertMention(filtered[highlightIdx]);
            return;
          }
          if (e.key === 'Escape') {
            setShowPicker(false);
            return;
          }
        }
        if (!showPicker && e.key === 'Enter' && !multiline && onEnter) {
          e.preventDefault();
          onEnter();
        }
      };

      const InputTag = multiline ? 'textarea' : 'input';

      return (
        <div style={{position: 'relative', width: '100%'}}>
          <div style={{display: 'flex', gap: 6, alignItems: 'flex-start'}}>
            <InputTag
              ref={inputRef}
              style={inputStyle || (multiline ? styles.textarea : styles.input)}
              value={value}
              onChange={handleChange}
              onKeyDown={handleKeyDown}
              placeholder={placeholder}
              rows={rows}
              autoFocus={autoFocus}
            />
            <button type="button" onClick={openPickerExplicitly} style={styles.mentionIconBtn} title="Tag en person (@)">
              <Icon name="at" size={15} />
            </button>
          </div>
          {showPicker && filtered.length > 0 && (
            <div style={styles.mentionPicker}>
              {filtered.slice(0, 6).map((u, i) => (
                <button key={u.id} type="button"
                  onClick={() => insertMention(u)}
                  style={i === highlightIdx ? styles.mentionItemActive : styles.mentionItem}>
                  <div style={styles.mentionAvatar}>{u.name[0].toUpperCase()}</div>
                  <div style={{flex: 1, textAlign: 'left'}}>
                    <div style={{fontSize: 13, fontWeight: 500}}>{u.name}</div>
                    <div style={{fontSize: 11, color: 'var(--ink-faint)'}}>@{u.name.split(' ')[0]}</div>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function LoginScreen({ onLogin, error }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [mode, setMode] = useState('login'); // 'login' or 'reset'
      const [resetMessage, setResetMessage] = useState('');
      const [resetError, setResetError] = useState('');

      const submit = async () => {
        if (!email.trim() || !password) return;
        setSubmitting(true);
        await onLogin(email.trim(), password);
        setSubmitting(false);
      };

      const sendReset = async () => {
        if (!email.trim()) {
          setResetError('Indtast din e-mail først');
          return;
        }
        setSubmitting(true);
        setResetError('');
        setResetMessage('');
        try {
          await window.firebaseFns.sendPasswordResetEmail(window.firebaseAuth, email.trim());
          setResetMessage(`En e-mail er sendt til ${email.trim()} med et link til at nulstille adgangskoden. Tjek også din spam-mappe.`);
        } catch (e) {
          setResetError(translateAuthError(e.code) || 'Kunne ikke sende e-mail');
        }
        setSubmitting(false);
      };

      return (
        <div style={styles.loginScreen}>
          <div style={styles.loginGrain}></div>
          <div style={styles.loginCard}>
            <div style={styles.loginBrand}>
              <img
                src="https://www.horntand.dk/wp-content/themes/atweb/assets/images/logo-simple.png"
                alt="Tandlægerne Nissen og Jensen"
                style={styles.loginLogo}
                onError={(e) => { e.target.style.display = 'none'; }}
              />
              <div>
                <div style={styles.loginTitle}>Arbejdsplatform</div>
                <div style={styles.loginSubtitle}>{mode === 'reset' ? 'Nulstil adgangskode' : 'For Tandlægerne Nissen og Jensen'}</div>
              </div>
            </div>
            <div style={styles.loginDivider}></div>

            <label style={styles.label}>E-mail</label>
            <input style={styles.input} type="email" value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="dit.navn@firma.dk"
              onKeyDown={(e) => e.key === 'Enter' && (mode === 'login' ? document.getElementById('pwd')?.focus() : sendReset())}
              autoFocus />

            {mode === 'login' && (
              <>
                <label style={{...styles.label, marginTop: 18}}>Adgangskode</label>
                <input id="pwd" style={styles.input} type="password" value={password}
                  onChange={(e) => setPassword(e.target.value)}

            {mode === 'login' ? (

                  onClick={submit} disabled={!email.trim() || !password || submitting}>

                </button>
                <button onClick={() => { setMode('reset'); setResetMessage(''); setResetError(''); }} style={styles.linkBtn}>
                  Glemt adgangskode?

            ) : (
              <>

    function DepartmentView({ dept, tasks, notes, users, userProfile, onNewTask, onTaskStatusChange, onTaskDelete, onTaskEdit, onAddNote, onUpdateNote, onAckNote, onDeleteNote, isMobile }) {
      const [noteText, setNoteText] = useState('');
      const [urgent, setUrgent] = useState(false);
      const [editingNoteId, setEditingNoteId] = useState(null);
      const [editTask, setEditTask] = useState(null);
      const [filterOwnership, setFilterOwnership] = useState('all'); // 'all' | 'mine' | 'assigned'

      // Apply visibility filtering (Kontor and Reception)
      const visibleTasks = tasks.filter(t => {
        const visibility = t.visibility || 'all';
        if (visibility === 'all') return true;
        if (visibility === 'private') return t.createdBy === userProfile.id;
        if (visibility === 'specific') {
          if (t.createdBy === userProfile.id) return true;
          if (t.assigneeId === userProfile.id) return true;
          if ((t.visibleTo || []).includes(userProfile.id)) return true;
          return false;
        }
        return true;
      });

      // Counts for ownership filter (exclude done tasks)
      const activeTasks = visibleTasks.filter(t => t.status !== 'done');
      const myCount = activeTasks.filter(t => t.createdBy === userProfile.id).length;
      const assignedCount = activeTasks.filter(t => t.assigneeId === userProfile.id).length;

      // Apply ownership filter
      const ownershipFiltered = visibleTasks.filter(t => {
        if (filterOwnership === 'mine') return t.createdBy === userProfile.id;
        if (filterOwnership === 'assigned') return t.assigneeId === userProfile.id;
        return true;
      });

      const submitNote = () => {
        if (!noteText.trim()) return;
        const mentions = extractMentions(noteText, users);
        onAddNote(noteText, urgent, mentions);
        setNoteText('');
        setUrgent(false);
      };

      const groupedTasks = {
        todo: ownershipFiltered.filter(t => t.status === 'todo'),
        in_progress: ownershipFiltered.filter(t => t.status === 'in_progress'),
        done: ownershipFiltered.filter(t => t.status === 'done'),
      };

      const notesByDate = notes.reduce((acc, n) => {
        const d = new Date(n.createdAt);
        const today = new Date();
        const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
        let label;
        if (d.toDateString() === today.toDateString()) label = 'I dag';
        else if (d.toDateString() === yesterday.toDateString()) label = 'I går';
        else label = d.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
        if (!acc[label]) acc[label] = [];
        acc[label].push(n);
        return acc;
      }, {});

        <div style={styles.viewBody}>

              <div style={styles.handoverInput}>

                <div style={styles.handoverInputRow}>

                                  {(userProfile.role === 'leder' || isMine) && (
                                    <>

                                        <Icon name="edit" size={13} />
                                      </button>
                                      <button onClick={() => onDeleteNote(n.id)} style={styles.iconBtn} title="Slet">
                                        <Icon name="trash" size={13} />

                                {acked.length > 0 && (
                                  <div style={styles.ackList}>Set af: {acked.map(a => a.name).join(', ')}</div>
                                )}
                              </>

                          </div>
                        );

                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
          {editTask && <EditDeptTaskModal
            dept={dept}
            task={editTask}
            users={users || []}
            currentUserId={userProfile.id}
            onClose={() => setEditTask(null)}
            onSave={(data) => { onTaskEdit(editTask.id, data); setEditTask(null); }} />}
        </div>

    }

    function NoteEditor({ note, onSave, onCancel }) {

      const [urgent, setUrgent] = useState(!!note.urgent);
      return (
        <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
          <textarea style={{...styles.textarea, minHeight: 60}} value={text}
            onChange={(e) => setText(e.target.value)} rows={3} autoFocus />
          <div style={{display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap'}}>
            <label style={styles.urgentToggle}>
              <input type="checkbox" checked={urgent} onChange={(e) => setUrgent(e.target.checked)} />
              <Icon name="bell" size={13} /> Vigtig
            </label>
            <div style={{flex: 1}}></div>
            <button onClick={onCancel} style={styles.ghostBtn}>Annullér</button>
            <button onClick={() => onSave(text, urgent)} style={styles.primaryBtn} disabled={!text.trim()}>Gem</button>
          </div>
        </div>
      );
    }

    function EditDeptTaskModal({ dept, task, users, currentUserId, onClose, onSave }) {
      const supportsVisibility = dept.id === 'kontor' || dept.id === 'reception';
      const [title, setTitle] = useState(task.title || '');
      const [description, setDescription] = useState(task.description || '');
      const [priority, setPriority] = useState(task.priority || 'normal');
      const [dueDate, setDueDate] = useState(task.dueDate || '');
      const [assigneeId, setAssigneeId] = useState(task.assigneeId || '');
      const [visibility, setVisibility] = useState(task.visibility || 'all');
      const [visibleTo, setVisibleTo] = useState(task.visibleTo || []);

      const toggleVisibleTo = (userId) => {
        setVisibleTo(prev => prev.includes(userId)
          ? prev.filter(id => id !== userId)
          : [...prev, userId]);
      };

      const submit = () => {
        if (!title.trim()) return;
        const data = { title: title.trim(), description: description.trim(), priority, dueDate, assigneeId };
        if (supportsVisibility) {
          data.visibility = visibility;
          data.visibleTo = visibility === 'specific' ? visibleTo : [];
        }
        onSave(data);
      };

      const selectableUsers = users.filter(u => u.id !== currentUserId);

      return (
        <Modal onClose={onClose} title={`Rediger opgave i ${dept.label}`}>
          <label style={styles.label}>Titel *</label>
          <input style={styles.input} value={title} onChange={e => setTitle(e.target.value)} autoFocus />
          <label style={{...styles.label, marginTop: 18}}>Beskrivelse</label>
          <textarea style={styles.textarea} value={description} onChange={e => setDescription(e.target.value)} rows={4} />

          <div style={styles.formRow}>
            <div style={{flex: 1}}>
              <label style={styles.label}>Tildel til</label>
              <select style={styles.input} value={assigneeId} onChange={e => setAssigneeId(e.target.value)}>
                <option value="">Ikke tildelt</option>
                {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </div>
            <div style={{flex: 1}}>
              <label style={styles.label}>Deadline</label>
              <input style={styles.input} type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
            </div>
          </div>

          <label style={{...styles.label, marginTop: 18}}>Prioritet</label>
          <div style={styles.roleGroup}>
            {[{v:'low',l:'Lav'},{v:'normal',l:'Normal'},{v:'high',l:'Høj'}].map(p => (
              <button key={p.v} onClick={() => setPriority(p.v)} style={priority === p.v ? styles.roleBtnActive : styles.roleBtn}>{p.l}</button>
            ))}
          </div>
          {supportsVisibility && (
            <>
              <label style={{...styles.label, marginTop: 18}}>Synlig for</label>
              <div style={styles.roleGroup}>
                <button onClick={() => setVisibility('all')} style={visibility === 'all' ? styles.roleBtnActive : styles.roleBtn}>🌍 Alle</button>
                <button onClick={() => setVisibility('specific')} style={visibility === 'specific' ? styles.roleBtnActive : styles.roleBtn}>👥 Specifikke</button>
                <button onClick={() => setVisibility('private')} style={visibility === 'private' ? styles.roleBtnActive : styles.roleBtn}>🔒 Kun mig</button>
              </div>
              {visibility === 'specific' && (
                <div style={styles.specificPicker}>
                  <div style={styles.specificList}>
                    {selectableUsers.map(u => {
                      const checked = visibleTo.includes(u.id);
                      return (
                        <label key={u.id} style={checked ? styles.specificItemActive : styles.specificItem}>
                          <input type="checkbox" checked={checked} onChange={() => toggleVisibleTo(u.id)} />
                          <div style={styles.specificAvatar}>{u.name[0].toUpperCase()}</div>
                          <div style={{flex: 1}}>
                            <div style={{fontSize: 13, fontWeight: 500}}>{u.name}</div>
                          </div>
                        </label>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
          <div style={styles.modalActions}>
            <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>
            <button onClick={submit} style={styles.primaryBtn} disabled={!title.trim()}>Gem ændringer</button>
          </div>
        </Modal>
      );
    }

    function YearwheelView({ tasks, checks, docs, users, isAdmin, userProfile, selectedMonth, setSelectedMonth, onToggleCheck, onNewTask, onEditTask, onDeleteTask, onManageAccess, onSeedDefaults, onExportPDF, onSaveTaskNote, onNewDoc, onEditDoc, onDeleteDoc, isMobile }) {
      const [expandedTaskId, setExpandedTaskId] = useState(null);
      const [editingNoteForTask, setEditingNoteForTask] = useState(null);
      const [noteDraft, setNoteDraft] = useState('');
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Maj', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec'];
      const monthNamesFull = ['Januar', 'Februar', 'Marts', 'April', 'Maj', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'December'];
      const currentYear = new Date().getFullYear();
      const currentChecks = checks[String(currentYear)] || {};

      // Compute per-month progress
      const monthStats = {};
      for (let m = 1; m <= 12; m++) {
        const monthTasks = tasks.filter(t => t.month === m);
        const completedCount = monthTasks.filter(t => currentChecks[t.id]).length;
        monthStats[m] = { total: monthTasks.length, completed: completedCount };
      }

      const totalTasks = tasks.length;
      const totalCompleted = tasks.filter(t => currentChecks[t.id]).length;
      const totalPct = totalTasks ? Math.round((totalCompleted / totalTasks) * 100) : 0;

      const selectedMonthTasks = tasks.filter(t => t.month === selectedMonth)
        .sort((a, b) => (a.title || '').localeCompare(b.title || ''));

      // SVG geometry for the wheel
      const cx = 180, cy = 180, rOuter = 140, rInner = 70;
      const segments = [];
      for (let m = 1; m <= 12; m++) {
        const startAngle = ((m - 1) * 30 - 90) * Math.PI / 180; // -90 so jan starts at top
        const endAngle = (m * 30 - 90) * Math.PI / 180;
        const x1o = cx + rOuter * Math.cos(startAngle);
        const y1o = cy + rOuter * Math.sin(startAngle);
        const x2o = cx + rOuter * Math.cos(endAngle);
        const y2o = cy + rOuter * Math.sin(endAngle);
        const x1i = cx + rInner * Math.cos(endAngle);
        const y1i = cy + rInner * Math.sin(endAngle);
        const x2i = cx + rInner * Math.cos(startAngle);
        const y2i = cy + rInner * Math.sin(startAngle);
        const labelAngle = ((m - 1) * 30 + 15 - 90) * Math.PI / 180;
        const labelR = (rOuter + rInner) / 2;
        const labelX = cx + labelR * Math.cos(labelAngle);
        const labelY = cy + labelR * Math.sin(labelAngle);

        const { total, completed } = monthStats[m];
        let fill = 'var(--surface)';
        let strokeColor = 'var(--line)';
        let textColor = 'var(--ink)';
        let subTextColor = 'var(--ink-soft)';
        if (total > 0) {
          if (completed === total) { fill = '#C0DD97'; textColor = '#27500A'; subTextColor = '#27500A'; }
          else if (completed > 0) { fill = '#FAC775'; textColor = '#633806'; subTextColor = '#633806'; }
        }
        if (m === selectedMonth) {
          fill = 'var(--ink)';
          textColor = '#fff';
          subTextColor = '#fff';
          strokeColor = 'var(--ink)';
        }

        const path = `M ${x1o},${y1o} A ${rOuter},${rOuter} 0 0,1 ${x2o},${y2o} L ${x1i},${y1i} A ${rInner},${rInner} 0 0,0 ${x2i},${y2i} Z`;
        segments.push({
          m, path, fill, strokeColor, textColor, subTextColor,
          labelX, labelY,
          label: monthNames[m - 1],
          countLabel: total === 0 ? '–' : (completed === total ? `${completed}/${total} ✓` : `${completed}/${total}`),
        });
      }

      const categoryColors = {
        'Personale': 'var(--warm)',
        'Økonomi': 'var(--green)',
        'Lovpligtigt': 'var(--red)',
        'Udstyr': 'var(--ink-soft)',
        'Hygiejne': 'var(--red)',
      };

      return (
        <div style={styles.viewBody}>
          <div style={styles.yearwheelToolbar}>
            <div>
              <div style={styles.headerEyebrow}>Status {currentYear}</div>
              <div style={styles.yearwheelStatTitle}>{totalCompleted} af {totalTasks} opgaver — {totalPct}%</div>
            </div>
            <div style={{flex: 1}}></div>
            {isAdmin && tasks.length === 0 && (
              <button onClick={onSeedDefaults} style={styles.primaryBtn}>
                <Icon name="plus" size={14} /> Indlæs standardopgaver
              </button>
            )}
            {tasks.length > 0 && (
              <button onClick={onExportPDF} style={styles.ghostBtn}>
                <Icon name="download" size={14} /> Eksporter PDF
              </button>
            )}
            {isAdmin && (
              <button onClick={onManageAccess} style={styles.ghostBtn}>
                <Icon name="users" size={14} /> Administrer adgang
              </button>
            )}
          </div>

          <div style={isMobile ? styles.yearwheelLayoutMobile : styles.yearwheelLayout}>

            <div style={styles.yearwheelWheel}>
              <svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" style={{width: '100%', maxWidth: 360, display: 'block', margin: '0 auto', cursor: 'pointer'}}>
                {segments.map(seg => (
                  <g key={seg.m} onClick={() => setSelectedMonth(seg.m)}>
                    <path d={seg.path} fill={seg.fill} stroke={seg.strokeColor} strokeWidth="0.5" />
                    <text x={seg.labelX} y={seg.labelY - 3} fontFamily="var(--body)" fontSize="11" fontWeight="600" fill={seg.textColor} textAnchor="middle">{seg.label}</text>
                    <text x={seg.labelX} y={seg.labelY + 11} fontFamily="var(--body)" fontSize="9" fill={seg.subTextColor} textAnchor="middle">{seg.countLabel}</text>
                  </g>
                ))}
                <circle cx={cx} cy={cy} r={rInner} fill="var(--surface)" stroke="var(--line)" strokeWidth="0.5" pointerEvents="none"/>
                <text x={cx} y={cy - 12} fontFamily="var(--body)" fontSize="10" fill="var(--ink-soft)" textAnchor="middle" letterSpacing="0.15em" pointerEvents="none">{currentYear}</text>
                <text x={cx} y={cy + 12} fontFamily="var(--display)" fontSize="26" fontWeight="400" fill="var(--ink)" textAnchor="middle" pointerEvents="none">{totalPct}%</text>
                <text x={cx} y={cy + 28} fontFamily="var(--body)" fontSize="9" fill="var(--ink-soft)" textAnchor="middle" pointerEvents="none">færdige</text>
              </svg>
              <div style={styles.yearwheelLegend}>
                <span style={styles.yearwheelLegendItem}><span style={{...styles.yearwheelLegendDot, background: '#C0DD97'}}></span>Alle færdige</span>
                <span style={styles.yearwheelLegendItem}><span style={{...styles.yearwheelLegendDot, background: '#FAC775'}}></span>Påbegyndt</span>
                <span style={styles.yearwheelLegendItem}><span style={{...styles.yearwheelLegendDot, background: 'var(--surface)', border: '1px solid var(--line)'}}></span>Ikke startet</span>
              </div>
            </div>

            <div style={styles.yearwheelDetail}>
              <div style={styles.yearwheelDetailHead}>
                <div>
                  <div style={styles.yearwheelMonthTitle}>{monthNamesFull[selectedMonth - 1]}</div>
                  <div style={{fontSize: 12, color: 'var(--ink-soft)'}}>
                    {monthStats[selectedMonth].total === 0
                      ? 'Ingen opgaver endnu'
                      : `${monthStats[selectedMonth].completed} af ${monthStats[selectedMonth].total} klaret`}
                  </div>
                </div>
                {isAdmin && (
                  <button onClick={() => onNewTask(selectedMonth)} style={styles.primaryBtn}>
                    <Icon name="plus" size={14} /> Ny opgave
                  </button>
                )}
              </div>

              <div style={styles.yearwheelTaskList}>
                {selectedMonthTasks.length === 0 ? (
                  <div style={styles.yearwheelEmpty}>
                    Ingen opgaver i {monthNamesFull[selectedMonth - 1].toLowerCase()}.
                    {isAdmin && ' Klik "Ny opgave" for at tilføje en.'}
                  </div>
                ) : selectedMonthTasks.map(t => {
                  const check = currentChecks[t.id];
                  const isDone = !!check;
                  const isExpanded = expandedTaskId === t.id;
                  const isEditingNote = editingNoteForTask === t.id;
                  const hasNote = !!(t.note && t.note.trim());

                  return (
                    <div key={t.id} style={styles.yearwheelTaskWrapper}>
                      <div style={isDone ? styles.yearwheelTaskDone : styles.yearwheelTask}>
                        <button onClick={() => onToggleCheck(t.id, currentYear)} style={isDone ? styles.yearwheelCheckDone : styles.yearwheelCheck} title={isDone ? 'Fjern markering' : 'Markér som klaret'}>
                          {isDone && <Icon name="check" size={12} color="#fff" />}
                        </button>
                        <div style={{flex: 1, minWidth: 0, cursor: 'pointer'}} onClick={() => setExpandedTaskId(isExpanded ? null : t.id)}>

          <label style={{...styles.label, marginTop: 18}}>Tilknyt til måned (valgfrit)</label>
          <select style={styles.input} value={month} onChange={e => setMonth(e.target.value)}>

          <div style={styles.modalActions}>

        setSelected(prev => prev.includes(userId)
          ? prev.filter(id => id !== userId)
          : [...prev, userId]);

      return (
        <Modal onClose={onClose} title="Hvem skal kunne se årshjulet?">

    function OverviewView({ tasks, users, isMobile }) {
      const stats = {
        total: tasks.length,
        todo: tasks.filter(t => t.status === 'todo').length,
        inProgress: tasks.filter(t => t.status === 'in_progress').length,
        done: tasks.filter(t => t.status === 'done').length,
        highPriority: tasks.filter(t => t.priority === 'high' && t.status !== 'done').length,
      };
      const completion = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;

      const byAssignee = users.map(u => ({
        user: u,
        open: tasks.filter(t => t.assigneeId === u.id && t.status !== 'done').length,
        done: tasks.filter(t => t.assigneeId === u.id && t.status === 'done').length,
      })).filter(x => x.open + x.done > 0).sort((a, b) => (b.open + b.done) - (a.open + a.done));

      return (
        <div style={styles.viewBody}>
          <div style={isMobile ? styles.statsRowMobile : styles.statsRow}>
            <StatCard label="Opgaver i alt" value={stats.total} />
            <StatCard label="At gøre" value={stats.todo} accent="warm" />
            <StatCard label="I gang" value={stats.inProgress} accent="ink" />
            <StatCard label="Færdige" value={stats.done} accent="green" />
            <StatCard label="Høj prioritet" value={stats.highPriority} accent="red" />
          </div>

          <div style={styles.bigCard}>
            <div style={styles.cardHead}>
              <div style={styles.cardTitle}>Samlet fremdrift</div>
              <div style={styles.cardEyebrow}>{completion}% færdig</div>
            </div>
            <div style={styles.progressTrack}>
              <div style={{...styles.progressFill, width: `${completion}%`}}></div>
            </div>
            <div style={styles.progressLegend}>
              <span><span style={{...styles.dot, background: 'var(--green)'}}></span> {stats.done} færdige</span>
              <span><span style={{...styles.dot, background: 'var(--ink)'}}></span> {stats.inProgress} i gang</span>
              <span><span style={{...styles.dot, background: 'var(--warm)'}}></span> {stats.todo} venter</span>
            </div>
          </div>

          <div style={styles.bigCard}>
            <div style={styles.cardHead}>
              <div style={styles.cardTitle}>Aktivitet pr. medarbejder</div>
            </div>
            {byAssignee.length === 0 ? (
              <div style={styles.empty}>Ingen tildelte opgaver endnu.</div>
            ) : (
              <div style={styles.assigneeList}>
                {byAssignee.map(({ user, open, done }) => {
                  const total = open + done;
                  const pct = total ? (done / total) * 100 : 0;
                  return (
                    <div key={user.id} style={styles.assigneeRow}>
                      <div style={styles.assigneeRowLeft}>
                        <div style={styles.assigneeAvatar}>{user.name[0].toUpperCase()}</div>
                        <div>
                          <div style={styles.assigneeName}>{user.name}</div>
                          <div style={styles.assigneeMeta}>{open} åbne · {done} færdige</div>
                        </div>
                      </div>
                      <div style={styles.assigneeBar}>
                        <div style={{...styles.assigneeBarFill, width: `${pct}%`}}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function NewTaskModal({ users, currentUserId, onClose, onCreate }) {
      const [title, setTitle] = useState('');

      const [assigneeId, setAssigneeId] = useState('');
      const [priority, setPriority] = useState('normal');

      const [visibility, setVisibility] = useState('all');
      const [visibleTo, setVisibleTo] = useState([]);

      const toggleVisibleTo = (userId) => {
        setVisibleTo(prev => prev.includes(userId)
          ? prev.filter(id => id !== userId)
          : [...prev, userId]);

      const submit = () => {
        if (!title.trim()) return;
        const data = {
          title: title.trim(),
          description: description.trim(),
          assigneeId, priority, dueDate,
          visibility,
          visibleTo: visibility === 'specific' ? visibleTo : [],
        };
        onCreate(data);
      };

      // Filter out current user from "specific" selection (they always see their own)
      const selectableUsers = users.filter(u => u.id !== currentUserId);

      return (
        <Modal onClose={onClose} title="Ny opgave">
          <label style={styles.label}>Titel *</label>
          <input style={styles.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="Hvad skal der gøres?" autoFocus />

            {[{v:'low',l:'Lav'},{v:'normal',l:'Normal'},{v:'high',l:'Høj'}].map(p => (
              <button key={p.v} onClick={() => setPriority(p.v)} style={priority === p.v ? styles.roleBtnActive : styles.roleBtn}>{p.l}</button>

          {visibility === 'specific' && (
            <div style={styles.specificPicker}>
              <div style={styles.specificPickerHint}>

    function ChangePasswordModal({ authUser, onClose }) {
      const [currentPassword, setCurrentPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      const submit = async () => {
        setError('');
        if (newPassword.length < 6) {
          setError('Den nye adgangskode skal være mindst 6 tegn');
          return;
        }
        if (newPassword !== confirmPassword) {
          setError('De to nye adgangskoder er ikke ens');
          return;
        }
        setSubmitting(true);
        try {
          // Reauthenticate first (Firebase requires this for password change)
          const credential = window.firebaseFns.EmailAuthProvider.credential(authUser.email, currentPassword);
          await window.firebaseFns.reauthenticateWithCredential(authUser, credential);
          // Now update password
          await window.firebaseFns.updatePassword(authUser, newPassword);
          setSuccess(true);
          setTimeout(() => onClose(), 1800);
        } catch (e) {
          setError(translateAuthError(e.code) || 'Kunne ikke ændre adgangskoden');
        }
        setSubmitting(false);
      };

      return (
        <Modal onClose={onClose} title="Skift adgangskode">
          {success ? (
            <div style={styles.successBox}>
              ✓ Din adgangskode er ændret. Husk den til næste login!
            </div>
          ) : (
            <>
              <div style={styles.helpText}>
                Indtast din nuværende adgangskode for at bekræfte, og vælg derefter en ny.
              </div>

              <label style={{...styles.label, marginTop: 18}}>Nuværende adgangskode</label>
              <input style={styles.input} type="password" value={currentPassword}
                onChange={e => setCurrentPassword(e.target.value)} placeholder="••••••••" autoFocus />

              <label style={{...styles.label, marginTop: 18}}>Ny adgangskode (mindst 6 tegn)</label>
              <input style={styles.input} type="password" value={newPassword}
                onChange={e => setNewPassword(e.target.value)} placeholder="••••••••" />

              <label style={{...styles.label, marginTop: 18}}>Gentag ny adgangskode</label>
              <input style={styles.input} type="password" value={confirmPassword}
                onChange={e => setConfirmPassword(e.target.value)} placeholder="••••••••"
                onKeyDown={e => e.key === 'Enter' && submit()} />

              {error && <div style={styles.errorBox}>{error}</div>}

              <div style={styles.modalActions}>
                <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>
                <button onClick={submit} style={styles.primaryBtn}
                  disabled={!currentPassword || !newPassword || !confirmPassword || submitting}>
                  {submitting ? 'Ændrer…' : 'Skift adgangskode'}
                </button>
              </div>
            </>
          )}
        </Modal>
      );
    }
