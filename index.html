<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbejdsplatform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f1ea; --bg-deep: #ebe5db; --surface: #fdfbf7; --surface-2: #f9f5ee;
      --ink: #1a1814; --ink-soft: #6b6358; --ink-faint: #a39a8a;
      --line: #e3dccf; --line-soft: #ede7da;
      --warm: #c4622a; --warm-soft: #f4e6d6;
      --green: #3d6e4a; --green-soft: #dfe9d9;
      --red: #a8362c;
      --display: 'Fraunces', Georgia, serif;
      --body: 'Inter', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--body); -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; font-size: 16px; }
    @media (min-width: 768px) {
      input, textarea, select { font-size: 14px; }
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase v10 modular SDK via CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc,
      updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRJK6_EB8VHVbY8kYFvS0AhwywNtURug8",
      authDomain: "hr-tidsregistrering.firebaseapp.com",
      projectId: "hr-tidsregistrering",
      storageBucket: "hr-tidsregistrering.firebasestorage.app",
      messagingSenderId: "97158315115",
      appId: "1:97158315115:web:8a9ec5e16ae821e7d9852e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Expose to global so the React code can use them
    window.firebaseApp = app;
    window.firebaseAuth = auth;
    window.firebaseDb = db;
    window.firebaseFns = {
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      onAuthStateChanged, signOut, updateProfile,
      sendPasswordResetEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential,
      collection, doc, setDoc, getDoc, getDocs, addDoc,
      updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp, arrayUnion
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <script type="text/babel" data-presets="react" data-type="module">
    const { useState, useEffect, useMemo, useCallback, Fragment } = React;

    // Wait for Firebase to be ready before rendering
    function App() {
      const [fbReady, setFbReady] = useState(!!window.firebaseAuth);
      useEffect(() => {
        if (window.firebaseAuth) return;
        const onReady = () => setFbReady(true);
        window.addEventListener('firebase-ready', onReady);
        return () => window.removeEventListener('firebase-ready', onReady);
      }, []);
      if (!fbReady) return <LoadingScreen text="Forbinder til Firebase…" />;
      return <PlatformApp />;
    }

    function PlatformApp() {
      const auth = window.firebaseAuth;
      const db = window.firebaseDb;
      const fns = window.firebaseFns;

      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const [authUser, setAuthUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authError, setAuthError] = useState('');

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [documents, setDocuments] = useState([]);
      const [comments, setComments] = useState({});
      // Department data — keyed by department id ('reception', 'kontor', 'steril')
      const [deptTasks, setDeptTasks] = useState({ reception: [], kontor: [], steril: [] });
      const [deptNotes, setDeptNotes] = useState({ reception: [], kontor: [], steril: [] });

      const [view, setView] = useState('tasks');
      const [showNewTask, setShowNewTask] = useState(false);
      const [showNewDoc, setShowNewDoc] = useState(false);
      const [editDoc, setEditDoc] = useState(null);
      const [showNewDeptTask, setShowNewDeptTask] = useState(null); // dept id when open
      const [showNewUser, setShowNewUser] = useState(false);
      const [showChangePassword, setShowChangePassword] = useState(false);
      const [selectedTask, setSelectedTask] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterStatus, setFilterStatus] = useState('all');

      // Department definitions
      const DEPARTMENTS = [
        { id: 'reception', label: 'Reception', tasksCollection: 'platform_reception_tasks', notesCollection: 'platform_handover_notes' },
        { id: 'kontor', label: 'Kontor', tasksCollection: 'platform_kontor_tasks', notesCollection: 'platform_kontor_notes' },
        { id: 'steril', label: 'Steril', tasksCollection: 'platform_steril_tasks', notesCollection: 'platform_steril_notes' },
      ];

      // Listen to auth state
      useEffect(() => {
        const unsub = fns.onAuthStateChanged(auth, async (user) => {
          if (user) {
            setAuthUser(user);
            // Load or create user profile in Firestore
            try {
              const profileRef = fns.doc(db, 'platform_users', user.uid);
              const snap = await fns.getDoc(profileRef);
              if (snap.exists()) {
                setUserProfile({ id: user.uid, ...snap.data() });
              } else {
                // First time login - create profile (default role = medarbejder)
                const profile = {
                  email: user.email,
                  name: user.displayName || user.email.split('@')[0],
                  role: 'medarbejder',
                  createdAt: new Date().toISOString(),
                };
                await fns.setDoc(profileRef, profile);
                setUserProfile({ id: user.uid, ...profile });
              }
            } catch (e) {
              console.error('Profile load error:', e);
              setAuthError('Kunne ikke indlæse din profil: ' + e.message);
            }
          } else {
            setAuthUser(null);
            setUserProfile(null);
          }
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      // Subscribe to all collections once logged in
      useEffect(() => {
        if (!userProfile) return;
        const unsubs = [];

        // Users
        unsubs.push(fns.onSnapshot(fns.collection(db, 'platform_users'), (snap) => {
          setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }));

        // Tasks
        unsubs.push(fns.onSnapshot(
          fns.query(fns.collection(db, 'platform_tasks'), fns.orderBy('createdAt', 'desc')),
          (snap) => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        // Documents
        unsubs.push(fns.onSnapshot(
          fns.query(fns.collection(db, 'platform_documents'), fns.orderBy('createdAt', 'desc')),
          (snap) => setDocuments(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        ));

        // Comments (one document per task, holding an array)
        unsubs.push(fns.onSnapshot(fns.collection(db, 'platform_comments'), (snap) => {
          const map = {};
          snap.docs.forEach(d => { map[d.id] = d.data().items || []; });
          setComments(map);
        }));

        // Department tasks + notes — subscribe per department
        DEPARTMENTS.forEach(dept => {
          unsubs.push(fns.onSnapshot(
            fns.query(fns.collection(db, dept.tasksCollection), fns.orderBy('createdAt', 'desc')),
            (snap) => setDeptTasks(prev => ({ ...prev, [dept.id]: snap.docs.map(d => ({ id: d.id, ...d.data() })) }))
          ));
          unsubs.push(fns.onSnapshot(
            fns.query(fns.collection(db, dept.notesCollection), fns.orderBy('createdAt', 'desc')),
            (snap) => setDeptNotes(prev => ({ ...prev, [dept.id]: snap.docs.map(d => ({ id: d.id, ...d.data() })) }))
          ));
        });

        return () => unsubs.forEach(u => u());
      }, [userProfile?.id]);

      // ---- Auth handlers ----
      const handleLogin = async (email, password) => {
        setAuthError('');
        try {
          await fns.signInWithEmailAndPassword(auth, email, password);
        } catch (e) {
          setAuthError(translateAuthError(e.code));
        }
      };

      const handleLogout = async () => {
        try { await fns.signOut(auth); } catch (e) { console.error(e); }
      };

      // ---- User management (admin only) ----
      const createNewUser = async (email, password, name, role) => {
        try {
          // Note: this signs the new user in, then we sign back in as admin
          // Better solution: use Firebase Admin SDK (server-side). For prototype this works.
          const cred = await fns.createUserWithEmailAndPassword(auth, email, password);
          await fns.updateProfile(cred.user, { displayName: name });
          await fns.setDoc(fns.doc(db, 'platform_users', cred.user.uid), {
            email, name, role,
            createdAt: new Date().toISOString(),
          });
          // Re-login as admin happens automatically because onAuthStateChanged
          // fires for the new user. Admin must log in again. Show message.
          alert(`Bruger "${name}" oprettet! Da Firebase nu har logget den nye bruger ind, skal du logge ind igen som admin.`);
          return true;
        } catch (e) {
          alert('Fejl ved oprettelse: ' + translateAuthError(e.code) + ' (' + e.message + ')');
          return false;
        }
      };

      const updateUserRole = async (uid, newRole) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_users', uid), { role: newRole });
        } catch (e) {
          alert('Fejl: ' + e.message);
        }
      };

      // ---- Task handlers ----
      const createTask = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_tasks'), {
            ...data, status: 'todo',
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewTask(false);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateTaskStatus = async (id, status) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_tasks', id), {
            status, updatedAt: new Date().toISOString(),
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateTask = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_tasks', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteTask = async (id) => {
        if (!confirm('Slet denne opgave?')) return;
        try {
          await fns.deleteDoc(fns.doc(db, 'platform_tasks', id));
          await fns.deleteDoc(fns.doc(db, 'platform_comments', id)).catch(() => {});
          setSelectedTask(null);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const addComment = async (taskId, text) => {
        const trimmed = text.trim();
        if (!trimmed) return;
        try {
          const ref = fns.doc(db, 'platform_comments', taskId);
          const snap = await fns.getDoc(ref);
          const newItem = {
            id: Date.now().toString(),
            author: userProfile.name, authorId: userProfile.id,
            text: trimmed, createdAt: new Date().toISOString(),
          };
          if (snap.exists()) {
            await fns.updateDoc(ref, { items: fns.arrayUnion(newItem) });
          } else {
            await fns.setDoc(ref, { items: [newItem] });
          }
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Document handlers ----
      const createDocument = async (data) => {
        try {
          await fns.addDoc(fns.collection(db, 'platform_documents'), {
            ...data,
            uploadedBy: userProfile.name, uploadedById: userProfile.id,
            createdAt: new Date().toISOString(),
          });
          setShowNewDoc(false);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteDocument = async (id) => {
        if (!confirm('Slet dette dokument?')) return;
        try { await fns.deleteDoc(fns.doc(db, 'platform_documents', id)); }
        catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDocument = async (id, data) => {
        try {
          await fns.updateDoc(fns.doc(db, 'platform_documents', id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Department handlers (generic for reception, kontor, steril) ----
      const getDept = (deptId) => DEPARTMENTS.find(d => d.id === deptId);

      const createDeptTask = async (deptId, data) => {
        try {
          const dept = getDept(deptId);
          await fns.addDoc(fns.collection(db, dept.tasksCollection), {
            ...data, status: 'todo',
            createdBy: userProfile.id, createdByName: userProfile.name,
            createdAt: new Date().toISOString(),
          });
          setShowNewDeptTask(null);
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptTaskStatus = async (deptId, id, status) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.tasksCollection, id), {
            status, updatedAt: new Date().toISOString(),
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptTask = async (deptId, id, data) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.tasksCollection, id), {
            ...data,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const updateDeptNote = async (deptId, id, text, urgent) => {
        try {
          const dept = getDept(deptId);
          await fns.updateDoc(fns.doc(db, dept.notesCollection, id), {
            text: text.trim(), urgent: !!urgent,
            updatedAt: new Date().toISOString(),
            updatedBy: userProfile.name,
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteDeptTask = async (deptId, id) => {
        if (!confirm('Slet denne opgave?')) return;
        try {
          const dept = getDept(deptId);
          await fns.deleteDoc(fns.doc(db, dept.tasksCollection, id));
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const addDeptNote = async (deptId, text, urgent) => {
        const trimmed = text.trim();
        if (!trimmed) return;
        try {
          const dept = getDept(deptId);
          await fns.addDoc(fns.collection(db, dept.notesCollection), {
            text: trimmed, urgent: !!urgent,
            author: userProfile.name, authorId: userProfile.id,
            acknowledged: [],
            createdAt: new Date().toISOString(),
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const acknowledgeDeptNote = async (deptId, id) => {
        try {
          const dept = getDept(deptId);
          const ref = fns.doc(db, dept.notesCollection, id);
          const snap = await fns.getDoc(ref);
          if (!snap.exists()) return;
          const acked = snap.data().acknowledged || [];
          if (acked.find(a => a.id === userProfile.id)) return;
          await fns.updateDoc(ref, {
            acknowledged: [...acked, { id: userProfile.id, name: userProfile.name, at: new Date().toISOString() }],
          });
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      const deleteDeptNote = async (deptId, id) => {
        if (!confirm('Slet denne besked?')) return;
        try {
          const dept = getDept(deptId);
          await fns.deleteDoc(fns.doc(db, dept.notesCollection, id));
        } catch (e) { alert('Fejl: ' + e.message); }
      };

      // ---- Render ----
      if (authLoading) return <LoadingScreen text="Indlæser…" />;
      if (!authUser) return <LoginScreen onLogin={handleLogin} error={authError} />;
      if (!userProfile) return <LoadingScreen text="Indlæser profil…" />;

      const isAdmin = userProfile.role === 'leder';

      // Compute badge counts for each department
      const deptBadges = {};
      DEPARTMENTS.forEach(dept => {
        const openTasks = (deptTasks[dept.id] || []).filter(t => t.status !== 'done').length;
        const unreadUrgent = (deptNotes[dept.id] || []).filter(n =>
          n.urgent && !(n.acknowledged || []).find(a => a.id === userProfile.id)
        ).length;
        deptBadges[dept.id] = openTasks + unreadUrgent;
      });

      return (
        <div style={isMobile ? styles.appMobile : styles.app}>
          {isMobile && (
            <div style={styles.mobileTopbar}>
              <button onClick={() => setSidebarOpen(true)} style={styles.burgerBtn}>
                <Icon name="menu" size={22} />
              </button>
              <div style={styles.mobileTopbarTitle}>
                <span style={styles.mobileMark}>◐</span> Arbejdsplatform
              </div>
              <div style={styles.mobileTopbarAvatar}>{userProfile.name[0].toUpperCase()}</div>
            </div>
          )}

          {isMobile && sidebarOpen && (
            <div style={styles.mobileSidebarOverlay} onClick={() => setSidebarOpen(false)}>
              <div style={styles.mobileSidebarPanel} onClick={(e) => e.stopPropagation()}>
                <Sidebar
                  userProfile={userProfile}
                  view={view}
                  setView={(v) => { setView(v); setSidebarOpen(false); }}
                  onLogout={handleLogout}
                  taskCount={tasks.filter(t => t.status !== 'done').length}
                  docCount={documents.length}
                  departments={DEPARTMENTS}
                  deptBadges={deptBadges}
                  isAdmin={isAdmin}
                  onChangePassword={() => { setShowChangePassword(true); setSidebarOpen(false); }}
                  isMobile={true}
                />
              </div>
            </div>
          )}

          {!isMobile && (
            <Sidebar
              userProfile={userProfile}
              view={view} setView={setView}
              onLogout={handleLogout}
              taskCount={tasks.filter(t => t.status !== 'done').length}
              docCount={documents.length}
              departments={DEPARTMENTS}
              deptBadges={deptBadges}
              isAdmin={isAdmin}
              onChangePassword={() => setShowChangePassword(true)}
            />
          )}

          <main style={isMobile ? styles.mainMobile : styles.main}>
            <Header view={view} userProfile={userProfile} departments={DEPARTMENTS} isMobile={isMobile} />
            {view === 'tasks' && <TasksView tasks={tasks} users={users} comments={comments} currentUserId={userProfile.id}
              onNew={() => setShowNewTask(true)} onSelect={setSelectedTask} onStatusChange={updateTaskStatus}
              searchQuery={searchQuery} setSearchQuery={setSearchQuery}
              filterStatus={filterStatus} setFilterStatus={setFilterStatus} isMobile={isMobile} />}
            {view === 'documents' && <DocumentsView documents={documents} userProfile={userProfile}
              onNew={() => setShowNewDoc(true)} onDelete={deleteDocument} onEdit={setEditDoc} />}
            {DEPARTMENTS.map(dept => view === dept.id && (
              <DepartmentView key={dept.id}
                dept={dept}
                tasks={deptTasks[dept.id] || []}
                notes={deptNotes[dept.id] || []}
                users={users}
                userProfile={userProfile}
                onNewTask={() => setShowNewDeptTask(dept.id)}
                onTaskStatusChange={(id, status) => updateDeptTaskStatus(dept.id, id, status)}
                onTaskDelete={(id) => deleteDeptTask(dept.id, id)}
                onTaskEdit={(id, data) => updateDeptTask(dept.id, id, data)}
                onAddNote={(text, urgent) => addDeptNote(dept.id, text, urgent)}
                onUpdateNote={(id, text, urgent) => updateDeptNote(dept.id, id, text, urgent)}
                onAckNote={(id) => acknowledgeDeptNote(dept.id, id)}
                onDeleteNote={(id) => deleteDeptNote(dept.id, id)}
                isMobile={isMobile} />
            ))}
            {view === 'overview' && <OverviewView tasks={tasks} users={users} isMobile={isMobile} />}
            {view === 'team' && <TeamView users={users} tasks={tasks} userProfile={userProfile}
              onNewUser={() => setShowNewUser(true)} onUpdateRole={updateUserRole} isAdmin={isAdmin} />}
          </main>

          {showNewTask && <NewTaskModal users={users} currentUserId={userProfile.id} onClose={() => setShowNewTask(false)} onCreate={createTask} />}
          {showNewDoc && <NewDocModal onClose={() => setShowNewDoc(false)} onCreate={createDocument} />}
          {editDoc && <EditDocModal doc={editDoc} onClose={() => setEditDoc(null)} onSave={(data) => { updateDocument(editDoc.id, data); setEditDoc(null); }} />}
          {showNewDeptTask && <NewDeptTaskModal
            dept={DEPARTMENTS.find(d => d.id === showNewDeptTask)}
            users={users}
            currentUserId={userProfile.id}
            onClose={() => setShowNewDeptTask(null)}
            onCreate={(data) => createDeptTask(showNewDeptTask, data)} />}
          {showNewUser && <NewUserModal onClose={() => setShowNewUser(false)} onCreate={createNewUser} />}
          {showChangePassword && <ChangePasswordModal authUser={authUser} onClose={() => setShowChangePassword(false)} />}
          {selectedTask && <TaskDetailModal task={tasks.find(t => t.id === selectedTask)} users={users}
            userProfile={userProfile} comments={comments[selectedTask] || []}
            onClose={() => setSelectedTask(null)} onStatusChange={updateTaskStatus}
            onAddComment={addComment} onDelete={deleteTask} onUpdate={updateTask} />}
        </div>
      );
    }

    function translateAuthError(code) {
      const map = {
        'auth/invalid-email': 'Ugyldig e-mailadresse',
        'auth/user-disabled': 'Brugeren er deaktiveret',
        'auth/user-not-found': 'Brugeren findes ikke',
        'auth/wrong-password': 'Forkert adgangskode',
        'auth/invalid-credential': 'Forkert e-mail eller adgangskode',
        'auth/too-many-requests': 'For mange forsøg - prøv igen senere',
        'auth/email-already-in-use': 'E-mailen er allerede i brug',
        'auth/weak-password': 'Adgangskoden skal være mindst 6 tegn',
        'auth/network-request-failed': 'Kunne ikke nå serveren',
        'auth/requires-recent-login': 'Du skal logge ud og ind igen før du kan skifte adgangskode',
        'auth/missing-email': 'Indtast en e-mail',
      };
      return map[code] || 'Login fejlede';
    }

    // ============================================================
    // SCREENS
    // ============================================================

    function LoadingScreen({ text }) {
      return (
        <div style={styles.loadingScreen}>
          <div style={styles.loadingDot}></div>
          <span style={styles.loadingText}>{text || 'Indlæser…'}</span>
        </div>
      );

    function LoginScreen({ onLogin, error }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [mode, setMode] = useState('login'); // 'login' or 'reset'
      const [resetMessage, setResetMessage] = useState('');
      const [resetError, setResetError] = useState('');

      const submit = async () => {
        if (!email.trim() || !password) return;
        setSubmitting(true);
        await onLogin(email.trim(), password);
        setSubmitting(false);
      };

      const sendReset = async () => {
        if (!email.trim()) {
          setResetError('Indtast din e-mail først');
          return;
        }
        setSubmitting(true);
        setResetError('');
        setResetMessage('');
        try {
          await window.firebaseFns.sendPasswordResetEmail(window.firebaseAuth, email.trim());
          setResetMessage(`En e-mail er sendt til ${email.trim()} med et link til at nulstille adgangskoden. Tjek også din spam-mappe.`);
        } catch (e) {
          setResetError(translateAuthError(e.code) || 'Kunne ikke sende e-mail');
        }
        setSubmitting(false);
      };

      return (
        <div style={styles.loginScreen}>
          <div style={styles.loginGrain}></div>
          <div style={styles.loginCard}>
            <div style={styles.loginBrand}>
              <div style={styles.loginMark}>◐</div>
              <div>
                <div style={styles.loginTitle}>Arbejdsplatform</div>
                <div style={styles.loginSubtitle}>{mode === 'reset' ? 'Nulstil adgangskode' : 'Opgaver · Retningslinjer · Reception'}</div>
              </div>
            </div>
            <div style={styles.loginDivider}></div>

            <label style={styles.label}>E-mail</label>
            <input style={styles.input} type="email" value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="dit.navn@firma.dk"
              onKeyDown={(e) => e.key === 'Enter' && (mode === 'login' ? document.getElementById('pwd')?.focus() : sendReset())}
              autoFocus />

            {mode === 'login' && (
              <>
                <label style={{...styles.label, marginTop: 18}}>Adgangskode</label>
                <input id="pwd" style={styles.input} type="password" value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="••••••••"
                  onKeyDown={(e) => e.key === 'Enter' && submit()} />
              </>
            )}

            {error && mode === 'login' && <div style={styles.errorBox}>{error}</div>}
            {resetError && <div style={styles.errorBox}>{resetError}</div>}
            {resetMessage && <div style={styles.successBox}>{resetMessage}</div>}

            {mode === 'login' ? (
              <>
                <button style={{...styles.primaryBtn, marginTop: 24, width: '100%', justifyContent: 'center'}}
                  onClick={submit} disabled={!email.trim() || !password || submitting}>
                  {submitting ? 'Logger ind…' : 'Log ind →'}
                </button>
                <button onClick={() => { setMode('reset'); setResetMessage(''); setResetError(''); }} style={styles.linkBtn}>
                  Glemt adgangskode?
                </button>
              </>
            ) : (
              <>
                <button style={{...styles.primaryBtn, marginTop: 24, width: '100%', justifyContent: 'center'}}
                  onClick={sendReset} disabled={!email.trim() || submitting}>
                  {submitting ? 'Sender…' : 'Send nulstillings-link'}
                </button>
                <button onClick={() => { setMode('login'); setResetMessage(''); setResetError(''); }} style={styles.linkBtn}>
                  ← Tilbage til login
                </button>
              </>
            )}

            <div style={styles.loginFoot}>
              {mode === 'login' ? 'Brug samme login som ferie-systemet.' : 'Du modtager en e-mail med et link til at vælge ny adgangskode.'}
            </div>
          </div>
        </div>
      );
    }

    function TasksView({ tasks, users, comments, currentUserId, onNew, onSelect, onStatusChange, searchQuery, setSearchQuery, filterStatus, setFilterStatus, isMobile }) {
      // Filter tasks based on visibility
      const visibleTasks = tasks.filter(t => {
        // Default to 'all' for tasks created before visibility feature existed
        const visibility = t.visibility || 'all';
        if (visibility === 'all') return true;
        if (visibility === 'private') return t.createdBy === currentUserId;
        if (visibility === 'specific') {
          // Visible to creator, assignee, and people in visibleTo list
          if (t.createdBy === currentUserId) return true;
          if (t.assigneeId === currentUserId) return true;
          if ((t.visibleTo || []).includes(currentUserId)) return true;
          return false;
        }
        return true;
      });

      const filtered = visibleTasks.filter(t => {
        if (filterStatus !== 'all' && t.status !== filterStatus) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return t.title.toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q);
        }
        return true;
      });
      const columns = [
        { id: 'todo', label: 'At gøre', icon: 'circle' },
        { id: 'in_progress', label: 'I gang', icon: 'clock' },
        { id: 'done', label: 'Færdig', icon: 'check-circle' },
      ];

      return (
        <div style={styles.viewBody}>
          <div style={styles.toolbar}>
            <div style={styles.searchWrap}>
              <Icon name="search" size={16} color="var(--ink-soft)" />
              <input style={styles.searchInput} placeholder="Søg i opgaver…"
                value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
            </div>
            <div style={styles.filterGroup}>
              {['all', 'todo', 'in_progress', 'done'].map(s => (
                <button key={s} onClick={() => setFilterStatus(s)}
                  style={filterStatus === s ? styles.filterBtnActive : styles.filterBtn}>
                  {s === 'all' ? 'Alle' : s === 'todo' ? 'At gøre' : s === 'in_progress' ? 'I gang' : 'Færdig'}
                </button>
              ))}
            </div>
            <button style={styles.primaryBtn} onClick={onNew}>
              <Icon name="plus" size={16} /> Ny opgave
            </button>
          </div>

          {tasks.length === 0 ? (
            <EmptyState icon="check" title="Ingen opgaver endnu"
              body="Opret den første opgave for teamet — den bliver synlig for alle."
              actionLabel="Opret opgave" onAction={onNew} />
          ) : (
            <div style={isMobile ? styles.kanbanMobile : styles.kanban}>
              {columns.map(col => {
                const colTasks = filtered.filter(t => t.status === col.id);
                return (
                  <div key={col.id} style={styles.column}>
                    <div style={styles.columnHead}>
                      <Icon name={col.icon} size={15} />
                      <span style={styles.columnTitle}>{col.label}</span>
                      <span style={styles.columnCount}>{colTasks.length}</span>
                    </div>
                    <div style={styles.columnBody}>
                      {colTasks.map(task => {
                        const assignee = users.find(u => u.id === task.assigneeId);
                        const cmts = comments[task.id] || [];
                        return (
                          <div key={task.id} style={styles.taskCard} onClick={() => onSelect(task.id)}>
                            {task.priority === 'high' && (
                              <div style={styles.priorityFlag}>
                                <Icon name="alert" size={12} /> Høj prioritet
                              </div>
                            )}
                            <div style={styles.taskTitle}>
                              {task.visibility === 'private' && <span title="Privat - kun dig" style={styles.visIcon}><Icon name="lock" size={11} /></span>}
                              {task.visibility === 'specific' && <span title="Specifikke personer" style={styles.visIcon}><Icon name="users" size={11} /></span>}
                              {task.title}
                            </div>
                            {task.description && (
                              <div style={styles.taskDesc}>
                                {task.description.length > 90 ? task.description.slice(0, 90) + '…' : task.description}
                              </div>
                            )}
                            <div style={styles.taskMeta}>
                              {assignee && (
                                <div style={styles.assigneeChip}>
                                  <div style={styles.assigneeDot}>{assignee.name[0].toUpperCase()}</div>
                                  <span>{assignee.name.split(' ')[0]}</span>
                                </div>
                              )}
                              {task.dueDate && (
                                <span style={styles.dueDate}>
                                  {new Date(task.dueDate).toLocaleDateString('da-DK', { day: 'numeric', month: 'short' })}
                                </span>
                              )}
                              {cmts.length > 0 && (
                                <span style={styles.commentBadge}>
                                  <Icon name="message" size={11} /> {cmts.length}
                                </span>
                              )}
                            </div>
                            <div style={styles.taskActions}>
                              {col.id !== 'todo' && <button onClick={(e) => { e.stopPropagation(); onStatusChange(task.id, 'todo'); }} style={styles.miniBtn}>← At gøre</button>}
                              {col.id !== 'in_progress' && <button onClick={(e) => { e.stopPropagation(); onStatusChange(task.id, 'in_progress'); }} style={styles.miniBtn}>I gang</button>}
                              {col.id !== 'done' && <button onClick={(e) => { e.stopPropagation(); onStatusChange(task.id, 'done'); }} style={styles.miniBtn}>Færdig →</button>}
                            </div>
                          </div>
                        );
                      })}
                      {colTasks.length === 0 && <div style={styles.colEmpty}>Ingen opgaver</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function DepartmentView({ dept, tasks, notes, users, userProfile, onNewTask, onTaskStatusChange, onTaskDelete, onTaskEdit, onAddNote, onUpdateNote, onAckNote, onDeleteNote, isMobile }) {
      const [noteText, setNoteText] = useState('');
      const [urgent, setUrgent] = useState(false);
      const [editingNoteId, setEditingNoteId] = useState(null);
      const [editTask, setEditTask] = useState(null);

      // Apply visibility filtering (currently only Kontor uses this)
      const visibleTasks = tasks.filter(t => {
        const visibility = t.visibility || 'all';
        if (visibility === 'all') return true;
        if (visibility === 'private') return t.createdBy === userProfile.id;
        if (visibility === 'specific') {
          if (t.createdBy === userProfile.id) return true;
          if ((t.visibleTo || []).includes(userProfile.id)) return true;
          return false;
        }
        return true;
      });

      const submitNote = () => {
        if (!noteText.trim()) return;
        onAddNote(noteText, urgent);
        setNoteText('');
        setUrgent(false);
      };

      const groupedTasks = {
        todo: visibleTasks.filter(t => t.status === 'todo'),
        in_progress: visibleTasks.filter(t => t.status === 'in_progress'),
        done: visibleTasks.filter(t => t.status === 'done'),
      };

      const notesByDate = notes.reduce((acc, n) => {
        const d = new Date(n.createdAt);
        const today = new Date();
        const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
        let label;
        if (d.toDateString() === today.toDateString()) label = 'I dag';
        else if (d.toDateString() === yesterday.toDateString()) label = 'I går';
        else label = d.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
        if (!acc[label]) acc[label] = [];
        acc[label].push(n);
        return acc;
      }, {});

      return (
        <div style={styles.viewBody}>
          <div style={isMobile ? styles.receptionGridMobile : styles.receptionGrid}>
            <div style={styles.receptionCol}>
              <div style={styles.receptionSectionHead}>
                <div>
                  <div style={styles.receptionSectionEyebrow}>Sektion 01</div>
                  <div style={styles.receptionSectionTitle}>{dept.label} — opgaver</div>
                </div>
                <button style={styles.primaryBtn} onClick={onNewTask}>
                  <Icon name="plus" size={15} /> Ny opgave
                </button>
              </div>

              {visibleTasks.length === 0 ? (
                <div style={styles.receptionEmpty}>
                  <Icon name="bell" size={26} color="var(--ink-faint)" />
                  <div style={{...styles.emptyTitle, marginTop: 10}}>Ingen opgaver i {dept.label.toLowerCase()}</div>
                  <div style={styles.emptyBody}>Opgaver oprettet her er kun synlige i {dept.label}-fanen.</div>
                </div>
              ) : (
                <div style={styles.receptionTaskList}>
                  {['todo', 'in_progress', 'done'].map(status => {
                    const list = groupedTasks[status];
                    if (list.length === 0) return null;
                    const label = status === 'todo' ? 'At gøre' : status === 'in_progress' ? 'I gang' : 'Færdig';
                    return (
                      <div key={status} style={styles.receptionTaskGroup}>
                        <div style={styles.receptionGroupLabel}>{label} · {list.length}</div>
                        {list.map(task => (
                          <div key={task.id} style={styles.receptionTaskCard}>
                            <div style={styles.receptionTaskMain}>
                              <div style={{...styles.taskTitle, textDecoration: status === 'done' ? 'line-through' : 'none', opacity: status === 'done' ? 0.5 : 1}}>
                                {task.priority === 'high' && <span style={styles.inlinePriority}>●</span>}
                                {task.visibility === 'private' && <span title="Privat - kun dig" style={styles.visIcon}><Icon name="lock" size={11} /></span>}
                                {task.visibility === 'specific' && <span title="Specifikke personer" style={styles.visIcon}><Icon name="users" size={11} /></span>}
                                {task.title}
                              </div>
                              {task.description && <div style={styles.taskDesc}>{task.description}</div>}
                              <div style={styles.receptionTaskMeta}>
                                <span>Af {task.createdByName}</span>
                                <span>·</span>
                                <span>{new Date(task.createdAt).toLocaleDateString('da-DK', { day: 'numeric', month: 'short' })}</span>
                                {task.updatedAt && <span style={{fontStyle: 'italic'}}>· redigeret</span>}
                              </div>
                            </div>
                            <div style={styles.receptionTaskActions}>
                              {status !== 'todo' && <button onClick={() => onTaskStatusChange(task.id, 'todo')} style={styles.miniBtn} title="At gøre"><Icon name="circle" size={13} /></button>}
                              {status !== 'in_progress' && <button onClick={() => onTaskStatusChange(task.id, 'in_progress')} style={styles.miniBtn} title="I gang"><Icon name="clock" size={13} /></button>}
                              {status !== 'done' && <button onClick={() => onTaskStatusChange(task.id, 'done')} style={styles.miniBtn} title="Færdig"><Icon name="check-circle" size={13} /></button>}
                              {(userProfile.role === 'leder' || task.createdBy === userProfile.id) && (
                                <>
                                  <button onClick={() => setEditTask(task)} style={styles.miniBtn} title="Rediger"><Icon name="edit" size={13} /></button>
                                  <button onClick={() => onTaskDelete(task.id)} style={{...styles.miniBtn, color: 'var(--red)'}} title="Slet"><Icon name="trash" size={13} /></button>
                                </>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div style={styles.receptionCol}>
              <div style={styles.receptionSectionHead}>
                <div>
                  <div style={styles.receptionSectionEyebrow}>Sektion 02</div>
                  <div style={styles.receptionSectionTitle}>Vagtoverlevering</div>
                </div>
              </div>

              <div style={styles.handoverInput}>
                <textarea style={{...styles.textarea, minHeight: 70}} value={noteText}
                  onChange={(e) => setNoteText(e.target.value)}
                  placeholder={`Skriv en besked til næste vagt i ${dept.label.toLowerCase()}…`}
                  rows={3} />
                <div style={styles.handoverInputRow}>
                  <label style={styles.urgentToggle}>
                    <input type="checkbox" checked={urgent} onChange={(e) => setUrgent(e.target.checked)} />
                    <Icon name="bell" size={13} /> Markér som vigtig
                  </label>
                  <div style={{flex: 1}}></div>
                  <button onClick={submitNote} style={styles.primaryBtn} disabled={!noteText.trim()}>
                    <Icon name="send" size={14} /> Send
                  </button>
                </div>
              </div>

              <div style={styles.handoverFeed}>
                {notes.length === 0 ? (
                  <div style={styles.receptionEmpty}>
                    <Icon name="message" size={26} color="var(--ink-faint)" />
                    <div style={{...styles.emptyTitle, marginTop: 10}}>Ingen overleveringer endnu</div>
                    <div style={styles.emptyBody}>Skriv den første besked til kollegerne på næste vagt.</div>
                  </div>
                ) : (
                  Object.entries(notesByDate).map(([date, dateNotes]) => (
                    <div key={date} style={styles.handoverDateGroup}>
                      <div style={styles.handoverDateLabel}>{date}</div>
                      {dateNotes.map(n => {
                        const acked = (n.acknowledged || []);
                        const iAcked = acked.find(a => a.id === userProfile.id);
                        const isMine = n.authorId === userProfile.id;
                        const isEditing = editingNoteId === n.id;
                        return (
                          <div key={n.id} style={n.urgent ? styles.handoverNoteUrgent : styles.handoverNote}>
                            {n.urgent && !isEditing && (
                              <div style={styles.handoverUrgentTag}>
                                <Icon name="bell" size={11} /> Vigtig
                              </div>
                            )}
                            {isEditing ? (

    function EditDeptTaskModal({ dept, task, users, currentUserId, onClose, onSave }) {
      const supportsVisibility = dept.id === 'kontor' || dept.id === 'reception';
      const [title, setTitle] = useState(task.title || '');
      const [description, setDescription] = useState(task.description || '');
      const [priority, setPriority] = useState(task.priority || 'normal');
      const [visibility, setVisibility] = useState(task.visibility || 'all');
      const [visibleTo, setVisibleTo] = useState(task.visibleTo || []);

      const toggleVisibleTo = (userId) => {
        setVisibleTo(prev => prev.includes(userId)
          ? prev.filter(id => id !== userId)
          : [...prev, userId]);
      };

      const submit = () => {
        if (!title.trim()) return;
        const data = { title: title.trim(), description: description.trim(), priority };
        if (supportsVisibility) {
          data.visibility = visibility;
          data.visibleTo = visibility === 'specific' ? visibleTo : [];
        }
        onSave(data);
      };

      const selectableUsers = users.filter(u => u.id !== currentUserId);

      return (
        <Modal onClose={onClose} title={`Rediger opgave i ${dept.label}`}>
          <label style={styles.label}>Titel *</label>
          <input style={styles.input} value={title} onChange={e => setTitle(e.target.value)} autoFocus />
          <label style={{...styles.label, marginTop: 18}}>Beskrivelse</label>
          <textarea style={styles.textarea} value={description} onChange={e => setDescription(e.target.value)} rows={4} />

            ))}
          </div>
          {supportsVisibility && (
            <>
              <label style={{...styles.label, marginTop: 18}}>Synlig for</label>
              <div style={styles.roleGroup}>
                <button onClick={() => setVisibility('all')} style={visibility === 'all' ? styles.roleBtnActive : styles.roleBtn}>🌍 Alle</button>
                <button onClick={() => setVisibility('specific')} style={visibility === 'specific' ? styles.roleBtnActive : styles.roleBtn}>👥 Specifikke</button>
                <button onClick={() => setVisibility('private')} style={visibility === 'private' ? styles.roleBtnActive : styles.roleBtn}>🔒 Kun mig</button>
              </div>
              {visibility === 'specific' && (
                <div style={styles.specificPicker}>
                  <div style={styles.specificList}>

            </>

            <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>

          </div>
        </Modal>
      );

    function OverviewView({ tasks, users, isMobile }) {
      const stats = {
        total: tasks.length,
        todo: tasks.filter(t => t.status === 'todo').length,
        inProgress: tasks.filter(t => t.status === 'in_progress').length,
        done: tasks.filter(t => t.status === 'done').length,
        highPriority: tasks.filter(t => t.priority === 'high' && t.status !== 'done').length,
      };
      const completion = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;

      const byAssignee = users.map(u => ({
        user: u,
        open: tasks.filter(t => t.assigneeId === u.id && t.status !== 'done').length,
        done: tasks.filter(t => t.assigneeId === u.id && t.status === 'done').length,
      })).filter(x => x.open + x.done > 0).sort((a, b) => (b.open + b.done) - (a.open + a.done));

      return (
        <div style={styles.viewBody}>
          <div style={isMobile ? styles.statsRowMobile : styles.statsRow}>
            <StatCard label="Opgaver i alt" value={stats.total} />
            <StatCard label="At gøre" value={stats.todo} accent="warm" />
            <StatCard label="I gang" value={stats.inProgress} accent="ink" />
            <StatCard label="Færdige" value={stats.done} accent="green" />
            <StatCard label="Høj prioritet" value={stats.highPriority} accent="red" />
          </div>

          <div style={styles.bigCard}>
            <div style={styles.cardHead}>
              <div style={styles.cardTitle}>Samlet fremdrift</div>
              <div style={styles.cardEyebrow}>{completion}% færdig</div>
            </div>
            <div style={styles.progressTrack}>
              <div style={{...styles.progressFill, width: `${completion}%`}}></div>
            </div>
            <div style={styles.progressLegend}>
              <span><span style={{...styles.dot, background: 'var(--green)'}}></span> {stats.done} færdige</span>
              <span><span style={{...styles.dot, background: 'var(--ink)'}}></span> {stats.inProgress} i gang</span>
              <span><span style={{...styles.dot, background: 'var(--warm)'}}></span> {stats.todo} venter</span>
            </div>
          </div>

          <div style={styles.bigCard}>
            <div style={styles.cardHead}>
              <div style={styles.cardTitle}>Aktivitet pr. medarbejder</div>
            </div>
            {byAssignee.length === 0 ? (
              <div style={styles.empty}>Ingen tildelte opgaver endnu.</div>
            ) : (
              <div style={styles.assigneeList}>
                {byAssignee.map(({ user, open, done }) => {
                  const total = open + done;
                  const pct = total ? (done / total) * 100 : 0;
                  return (
                    <div key={user.id} style={styles.assigneeRow}>
                      <div style={styles.assigneeRowLeft}>
                        <div style={styles.assigneeAvatar}>{user.name[0].toUpperCase()}</div>
                        <div>
                          <div style={styles.assigneeName}>{user.name}</div>
                          <div style={styles.assigneeMeta}>{open} åbne · {done} færdige</div>
                        </div>
                      </div>
                      <div style={styles.assigneeBar}>
                        <div style={{...styles.assigneeBarFill, width: `${pct}%`}}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

                </div>
              )}

              {visibility === 'private' && (
                <div style={styles.visibilityHint}>
                  🔒 Denne opgave bliver kun synlig for dig — som en personlig huskeliste.
                </div>
              )}
            </>
          )}

          <div style={styles.modalActions}>
            <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>
            <button onClick={submit} style={styles.primaryBtn} disabled={!title.trim()}>Opret opgave</button>
          </div>
        </Modal>
      );
    }

    function ChangePasswordModal({ authUser, onClose }) {
      const [currentPassword, setCurrentPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      const submit = async () => {
        setError('');
        if (newPassword.length < 6) {
          setError('Den nye adgangskode skal være mindst 6 tegn');
          return;
        }
        if (newPassword !== confirmPassword) {
          setError('De to nye adgangskoder er ikke ens');
          return;
        }
        setSubmitting(true);
        try {
          // Reauthenticate first (Firebase requires this for password change)
          const credential = window.firebaseFns.EmailAuthProvider.credential(authUser.email, currentPassword);
          await window.firebaseFns.reauthenticateWithCredential(authUser, credential);
          // Now update password
          await window.firebaseFns.updatePassword(authUser, newPassword);
          setSuccess(true);
          setTimeout(() => onClose(), 1800);
        } catch (e) {
          setError(translateAuthError(e.code) || 'Kunne ikke ændre adgangskoden');
        }
        setSubmitting(false);
      };

      return (
        <Modal onClose={onClose} title="Skift adgangskode">
          {success ? (
            <div style={styles.successBox}>
              ✓ Din adgangskode er ændret. Husk den til næste login!
            </div>
          ) : (
            <>
              <div style={styles.helpText}>
                Indtast din nuværende adgangskode for at bekræfte, og vælg derefter en ny.
              </div>

              <label style={{...styles.label, marginTop: 18}}>Nuværende adgangskode</label>
              <input style={styles.input} type="password" value={currentPassword}
                onChange={e => setCurrentPassword(e.target.value)} placeholder="••••••••" autoFocus />

              <label style={{...styles.label, marginTop: 18}}>Ny adgangskode (mindst 6 tegn)</label>
              <input style={styles.input} type="password" value={newPassword}
                onChange={e => setNewPassword(e.target.value)} placeholder="••••••••" />

              <label style={{...styles.label, marginTop: 18}}>Gentag ny adgangskode</label>
              <input style={styles.input} type="password" value={confirmPassword}
                onChange={e => setConfirmPassword(e.target.value)} placeholder="••••••••"
                onKeyDown={e => e.key === 'Enter' && submit()} />

              {error && <div style={styles.errorBox}>{error}</div>}

              <div style={styles.modalActions}>
                <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>
                <button onClick={submit} style={styles.primaryBtn}
                  disabled={!currentPassword || !newPassword || !confirmPassword || submitting}>
                  {submitting ? 'Ændrer…' : 'Skift adgangskode'}
                </button>
              </div>
            </>
          )}
        </Modal>
      );
    }

    function NewUserModal({ onClose, onCreate }) {
      const [email, setEmail] = useState('');
      const [name, setName] = useState('');
      const [password, setPassword] = useState('');
      const [role, setRole] = useState('medarbejder');
      const [submitting, setSubmitting] = useState(false);

      const submit = async () => {
        if (!email.trim() || !name.trim() || password.length < 6) return;
        setSubmitting(true);
        const ok = await onCreate(email.trim(), password, name.trim(), role);
        setSubmitting(false);
        if (ok) onClose();
      };

      return (
        <Modal onClose={onClose} title="Opret ny bruger">
          <div style={styles.warningBox}>
            <strong>Bemærk:</strong> Når du opretter en bruger her, bliver du midlertidigt logget ind som vedkommende. Du skal logge ind igen som dig selv bagefter. Dette er en begrænsning i Firebase fra browseren.
          </div>
          <label style={styles.label}>Fulde navn *</label>
          <input style={styles.input} value={name} onChange={e => setName(e.target.value)} placeholder="fx Anna Jensen" autoFocus />
          <label style={{...styles.label, marginTop: 18}}>E-mail *</label>
          <input style={styles.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="anna@firma.dk" />
          <label style={{...styles.label, marginTop: 18}}>Midlertidig adgangskode * (mindst 6 tegn)</label>
          <input style={styles.input} type="text" value={password} onChange={e => setPassword(e.target.value)} placeholder="•••••••••" />
          <div style={styles.helpText}>Send denne adgangskode til medarbejderen — de kan ændre den senere.</div>
          <label style={{...styles.label, marginTop: 18}}>Rolle</label>
          <div style={styles.roleGroup}>
            <button onClick={() => setRole('medarbejder')} style={role === 'medarbejder' ? styles.roleBtnActive : styles.roleBtn}>Medarbejder</button>
            <button onClick={() => setRole('leder')} style={role === 'leder' ? styles.roleBtnActive : styles.roleBtn}>Admin</button>
          </div>
          <div style={styles.modalActions}>
            <button onClick={onClose} style={styles.ghostBtn}>Annullér</button>
            <button onClick={submit} style={styles.primaryBtn} disabled={!email.trim() || !name.trim() || password.length < 6 || submitting}>
              {submitting ? 'Opretter…' : 'Opret bruger'}
            </button>
          </div>
        </Modal>
      );
    }

    function TaskDetailModal({ task, users, userProfile, comments, onClose, onStatusChange, onAddComment, onDelete, onUpdate }) {
      const [comment, setComment] = useState('');
      const [editMode, setEditMode] = useState(false);
      // Edit fields
      const [editTitle, setEditTitle] = useState('');
      const [editDescription, setEditDescription] = useState('');
      const [editAssigneeId, setEditAssigneeId] = useState('');
      const [editPriority, setEditPriority] = useState('normal');
      const [editDueDate, setEditDueDate] = useState('');
      const [editVisibility, setEditVisibility] = useState('all');
      const [editVisibleTo, setEditVisibleTo] = useState([]);

      if (!task) return null;
      const assignee = users.find(u => u.id === task.assigneeId);
      const canEdit = userProfile.role === 'leder' || task.createdBy === userProfile.id;

      const startEdit = () => {
        setEditTitle(task.title || '');
        setEditDescription(task.description || '');
        setEditAssigneeId(task.assigneeId || '');
        setEditPriority(task.priority || 'normal');
        setEditDueDate(task.dueDate || '');
        setEditVisibility(task.visibility || 'all');
        setEditVisibleTo(task.visibleTo || []);
        setEditMode(true);
      };

      const toggleVisibleTo = (userId) => {
        setEditVisibleTo(prev => prev.includes(userId)
          ? prev.filter(id => id !== userId)
          : [...prev, userId]);
      };

      const saveEdits = () => {
        if (!editTitle.trim()) return;
        onUpdate(task.id, {
          title: editTitle.trim(),
          description: editDescription.trim(),
          assigneeId: editAssigneeId,
          priority: editPriority,
          dueDate: editDueDate,
          visibility: editVisibility,
          visibleTo: editVisibility === 'specific' ? editVisibleTo : [],
        });
        setEditMode(false);
      };

      const send = () => {
        if (!comment.trim()) return;
        onAddComment(task.id, comment);
        setComment('');
      };

      const selectableUsers = users.filter(u => u.id !== userProfile.id);

      return (
        <Modal onClose={onClose} title={editMode ? "Rediger opgave" : "Opgavedetaljer"} wide>
          {editMode ? (
            <>
              <label style={styles.label}>Titel *</label>
              <input style={styles.input} value={editTitle} onChange={e => setEditTitle(e.target.value)} autoFocus />

              <label style={{...styles.label, marginTop: 18}}>Beskrivelse</label>
              <textarea style={styles.textarea} value={editDescription} onChange={e => setEditDescription(e.target.value)} rows={4} />

              <div style={styles.formRow}>
                <div style={{flex: 1}}>
                  <label style={styles.label}>Tildel til</label>
                  <select style={styles.input} value={editAssigneeId} onChange={e => setEditAssigneeId(e.target.value)}>
                    <option value="">Ikke tildelt</option>
                    {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>
                <div style={{flex: 1}}>
                  <label style={styles.label}>Deadline</label>
                  <input style={styles.input} type="date" value={editDueDate} onChange={e => setEditDueDate(e.target.value)} />
                </div>
              </div>

              <label style={{...styles.label, marginTop: 18}}>Prioritet</label>
              <div style={styles.roleGroup}>
                {[{v:'low',l:'Lav'},{v:'normal',l:'Normal'},{v:'high',l:'Høj'}].map(p => (
                  <button key={p.v} onClick={() => setEditPriority(p.v)} style={editPriority === p.v ? styles.roleBtnActive : styles.roleBtn}>{p.l}</button>
                ))}
              </div>

              <label style={{...styles.label, marginTop: 18}}>Synlig for</label>
              <div style={styles.roleGroup}>
                <button onClick={() => setEditVisibility('all')} style={editVisibility === 'all' ? styles.roleBtnActive : styles.roleBtn}>🌍 Alle</button>
                <button onClick={() => setEditVisibility('specific')} style={editVisibility === 'specific' ? styles.roleBtnActive : styles.roleBtn}>👥 Specifikke</button>
                <button onClick={() => setEditVisibility('private')} style={editVisibility === 'private' ? styles.roleBtnActive : styles.roleBtn}>🔒 Kun mig</button>
              </div>

              {editVisibility === 'specific' && (
                <div style={styles.specificPicker}>
                  <div style={styles.specificList}>
                    {selectableUsers.map(u => {
                      const checked = editVisibleTo.includes(u.id);
                      return (
                        <label key={u.id} style={checked ? styles.specificItemActive : styles.specificItem}>
                          <input type="checkbox" checked={checked} onChange={() => toggleVisibleTo(u.id)} />
                          <div style={styles.specificAvatar}>{u.name[0].toUpperCase()}</div>
                          <div style={{flex: 1}}><div style={{fontSize: 13, fontWeight: 500}}>{u.name}</div></div>
                        </label>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={styles.modalActions}>
                <button onClick={() => setEditMode(false)} style={styles.ghostBtn}>Annullér</button>
                <button onClick={saveEdits} style={styles.primaryBtn} disabled={!editTitle.trim()}>Gem ændringer</button>
              </div>
            </>
          ) : (
            <>
              {task.priority === 'high' && (
                <div style={styles.priorityBanner}>
                  <Icon name="alert" size={14} /> Høj prioritet
                </div>
              )}
              <div style={styles.taskDetailTitle}>{task.title}</div>
              {task.description && <div style={styles.taskDetailDesc}>{task.description}</div>}

              <div style={styles.taskDetailMeta}>
                <div style={styles.metaItem}><span style={styles.metaLabel}>Status</span><span style={styles.metaVal}>{task.status === 'todo' ? 'At gøre' : task.status === 'in_progress' ? 'I gang' : 'Færdig'}</span></div>
                <div style={styles.metaItem}><span style={styles.metaLabel}>Tildelt</span><span style={styles.metaVal}>{assignee ? assignee.name : '—'}</span></div>
                <div style={styles.metaItem}><span style={styles.metaLabel}>Oprettet af</span><span style={styles.metaVal}>{task.createdByName}</span></div>
                {task.dueDate && <div style={styles.metaItem}><span style={styles.metaLabel}>Deadline</span><span style={styles.metaVal}>{new Date(task.dueDate).toLocaleDateString('da-DK')}</span></div>}
                <div style={styles.metaItem}>
                  <span style={styles.metaLabel}>Synlighed</span>
                  <span style={styles.metaVal}>
                    {(!task.visibility || task.visibility === 'all') && '🌍 Alle'}
                    {task.visibility === 'specific' && `👥 Specifikke (${(task.visibleTo || []).length + 1} pers.)`}
                    {task.visibility === 'private' && '🔒 Privat'}
                  </span>
                </div>
                {task.updatedAt && (
                  <div style={styles.metaItem}>
                    <span style={styles.metaLabel}>Sidst redigeret</span>
                    <span style={styles.metaVal}>{new Date(task.updatedAt).toLocaleDateString('da-DK')} af {task.updatedBy || '—'}</span>
                  </div>
                )}
              </div>

              <div style={styles.statusRow}>
                {['todo', 'in_progress', 'done'].map(s => (
                  <button key={s} onClick={() => onStatusChange(task.id, s)} style={task.status === s ? styles.roleBtnActive : styles.roleBtn}>
                    {s === 'todo' ? 'At gøre' : s === 'in_progress' ? 'I gang' : 'Færdig'}
                  </button>
                ))}
              </div>

              <div style={styles.commentSection}>
                <div style={styles.commentHead}>
                  <Icon name="message" size={15} /> Kommentarer ({comments.length})
                </div>
                <div style={styles.commentList}>
                  {comments.length === 0 && <div style={styles.empty}>Ingen kommentarer endnu.</div>}
                  {comments.map(c => (
                    <div key={c.id} style={styles.commentItem}>
                      <div style={styles.commentAvatar}>{c.author[0].toUpperCase()}</div>
                      <div style={{flex: 1}}>
                        <div style={styles.commentHeader}>
                          <strong>{c.author}</strong>
                          <span style={styles.commentDate}>{new Date(c.createdAt).toLocaleString('da-DK', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        <div style={styles.commentText}>{c.text}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={styles.commentInputRow}>
                  <input style={{...styles.input, flex: 1, marginTop: 0}} value={comment} onChange={e => setComment(e.target.value)} placeholder="Skriv en kommentar…" onKeyDown={e => e.key === 'Enter' && send()} />
                  <button onClick={send} style={styles.primaryBtn} disabled={!comment.trim()}>
                    <Icon name="send" size={15} />
                  </button>
                </div>
              </div>

              <div style={styles.modalActions}>
                {canEdit && (
                  <>
                    <button onClick={startEdit} style={styles.ghostBtn}>
                      <Icon name="edit" size={14} /> Rediger
                    </button>
                    <button onClick={() => onDelete(task.id)} style={styles.dangerBtn}>
                      <Icon name="trash" size={14} /> Slet opgave
                    </button>
                  </>
                )}
                <div style={{flex: 1}}></div>
                <button onClick={onClose} style={styles.ghostBtn}>Luk</button>
              </div>
            </>
          )}
        </Modal>
      );
    }
